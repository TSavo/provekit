# PEP 1.7.0 realize plugin manifest for Java + sugar-rfc8785-jcs-java body emission.
# Sister manifest to .sugar/realize/rust-shim-rfc8785-jcs under
# concept:family:json-canonicalization. Three concepts: encode + encode-value + encode-string.
name = "java-realize-rfc8785-jcs"
library_tag = "sugar-rfc8785-jcs-java"
family = "concept:family:json-canonicalization"
library_version = "0.1"
provides_concepts = ["concept:rfc8785-jcs-encode", "concept:rfc8785-jcs-encode-value", "concept:rfc8785-jcs-encode-string"]
dependencies = [
  "com.fasterxml.jackson.core:jackson-databind:2.17.2",
  "com.fasterxml.jackson.core:jackson-core:2.17.2",
  "com.fasterxml.jackson.core:jackson-annotations:2.17.2",
]
command = ["java", "-jar", "implementations/java/sugar-realize-java-core/target/sugar-realize-java.jar", "--rpc"]
working_dir = "."
