# PEP 1.7.0 realize plugin manifest for Java + Bouncy Castle Blake3.
# Sister manifest to .sugar/realize/rust-shim-blake3 under concept:family:hash.
name = "java-realize-blake3"
library_tag = "bouncycastle"
family = "concept:family:hash"
library_version = "1.78"
provides_concepts = ["concept:blake3-512-of"]
dependencies = [
  "org.bouncycastle:bcprov-jdk18on:1.81.1",
]
command = ["java", "-jar", "implementations/java/sugar-realize-java-core/target/sugar-realize-java.jar", "--rpc"]
working_dir = "."
