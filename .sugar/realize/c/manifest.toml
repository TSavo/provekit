# PEP 1.7.0 `kind = "realize"` plugin manifest for canonical C body emission.
# cmd_bind dispatches canonical rewrite emission here when target-language=c.
name = "c-realize"
library_tag = "libcurl"
family = "concept:family:http"
library_version = "8"
# #1364 / #1355: per-kit concept coverage. The catch-all c body-templates
# JSON declares http-request + http-response alongside IR primitives
# (factorial, pair, option, result, etc.) which are realized structurally
# by the binary's term-shape lowering and don't belong in this list.
provides_concepts = ["http-request", "http-response"]
command = ["implementations/c/sugar-realize-c-core/target/release/sugar-realize-c", "--rpc"]
working_dir = "."
