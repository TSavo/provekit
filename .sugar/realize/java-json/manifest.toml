# PEP 1.7.0 realize plugin manifest for Java + Jackson JSON body emission.
# Sister manifest to .sugar/realize/rust-shim-serde-json (rust kit's
# serde_json realization) under concept:family:json. Routes the 2 json
# concepts (parse + serialize) from sugar-shim-json-java's .proof envelope.
name = "java-realize-json"
library_tag = "jackson"
family = "concept:family:json"
library_version = "2.17"
provides_concepts = ["concept:json-parse", "concept:json-serialize"]
dependencies = [
  "com.fasterxml.jackson.core:jackson-databind:2.17.2",
  "com.fasterxml.jackson.core:jackson-core:2.17.2",
  "com.fasterxml.jackson.core:jackson-annotations:2.17.2",
]
command = ["java", "-jar", "implementations/java/sugar-realize-java-core/target/sugar-realize-java.jar", "--rpc"]
working_dir = "."
