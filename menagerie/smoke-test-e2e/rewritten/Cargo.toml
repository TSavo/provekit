[package]
name = "smoke-test-e2e-rewritten"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "End-to-end smoke test fixture for the paper-20 eight-verb vision: Lift, Cluster, Name, Scope, Cluster, Identify, Realize, Witness."
workspace = "../../implementations/rust"

[lib]
name = "smoke_test_e2e_rewritten"
path = "src/lib.rs"

# The fixture has no runtime dependencies. The driver crate (sibling
# directory `driver/`) pulls in the provekit kit crates (canonicalizer,
# ir-symbolic, claim-envelope). The fixture itself is plain Rust 2021
# so `cargo test` runs unmodified on any stable toolchain.

[dev-dependencies]
