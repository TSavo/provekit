  - id: protocol-switchyard
    path: protocol-switchyard
    runnable: planned
    claim: protocol versions as roots and migrations as witnessed edges
  - id: change-station
    path: change-station
    runnable: planned
    claim: commits as p -> q proof-carrying transitions
