layer: gates
native_artifact: artifacts/gates/full_adder.blif
native_format: blif
projection: blif-lifter/v0
emits_claim: gates.full_adder.equations
requires_claims:
  - cells.boolean_gates.valid_in_envelope
summary: The full-adder netlist implements XOR3 for sum and MAJ3 for carry.
input_assumptions:
  - Inputs a, b, and cin are Boolean.
  - BLIF .names tables are complete enough for the toy recognizer.
required_lifter_markers:
  - "bridgeworks:claim gates.full_adder.equations"
  - "sum = a XOR b XOR cin"
  - "cout = majority(a, b, cin)"
positive_checks:
  - First .names block recognizes XOR for a and b.
  - Second .names block recognizes XOR for axb and cin.
  - Carry table contains all three majority minterms.
refusal_cases:
  - id: gates_xor_replaced_by_or
    artifact: mutations/gates/full_adder_xor_replaced_by_or.blif
    reason: OR does not satisfy the full-adder sum equation.
trusted_stops:
  - Gate-level equivalence is limited to this one-bit full-adder pattern.
