layer: isa
contract_sheet: bridgeworks.checked_add_u8.isa
native_artifacts:
  - artifacts/isa/toy8.isa
lifter: toy8-isa adapter

emitted_claim:
  id: isa.add8.carry_semantics
  meaning: >
    ADD8 produces the low 8 bits of unsigned addition and sets carry exactly
    when the unsigned mathematical sum is at least 256.

required_semantics:
  instruction: ADD8
  word_bits: 8
  sum_relation: dst == (lhs + rhs) mod 256
  carry_relation: carry == (lhs + rhs >= 256)
  overflow_model: unsigned_carry

refusal_cases:
  - id: isa_signed_overflow
    path: mutations/isa/toy8.isa
    reason: carry is defined as signed overflow instead of unsigned carry

adapter_output:
  emit_normal_proofir_later: true
  private_proof_format: none
