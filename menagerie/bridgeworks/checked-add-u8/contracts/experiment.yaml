layer: experiment
native_artifacts:
  - artifacts/experiment/bandgap-measurements.csv
  - artifacts/experiment/calibration-note.md
native_format: csv-with-markdown-calibration-note
projection: measurement-lifter/v0
emits_claim: experiment.material_parameters.within_tolerance
requires_claims: []
summary: Measured material parameters are within P under the signed calibration policy.
input_assumptions:
  - CSV comment markers are preserved for the toy measurement lifter.
  - The calibration note and CSV refer to the same calibration signature.
required_lifter_markers:
  - "bridgeworks:claim experiment.material_parameters.within_tolerance"
  - "bridgeworks:calibration_signature BW-CAL-2026-05-08-SHA256-4b57c1d8"
positive_checks:
  - All measured rows are inside the calibration note acceptance policy.
  - The CSV and calibration note signatures match exactly.
refusal_cases:
  - id: experiment_measurement_changed_without_calibration_signature
    artifact: mutations/experiment/bandgap_measurement_changed_without_signature.csv
    reason: measurement content changed while retaining the old calibration signature.
trusted_stops:
  - The signature is a toy marker, not a cryptographic attestation.
