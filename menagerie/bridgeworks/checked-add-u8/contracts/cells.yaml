layer: cells
native_artifact: artifacts/cells/cells.sp
native_format: spice
projection: spice-envelope-lifter/v0
emits_claim: cells.boolean_gates.valid_in_envelope
requires_claims:
  - device_physics.mosfet_switch.valid
summary: Boolean INV, NAND2, and NOR2 cells are valid inside envelope E.
input_assumptions:
  - The gate netlist uses only the declared static CMOS cells.
  - Device models satisfy the MOSFET switch abstraction claim.
required_lifter_markers:
  - "bridgeworks:claim cells.boolean_gates.valid_in_envelope"
  - "NOISE_MARGIN_HIGH_MIN"
  - "NOISE_MARGIN_LOW_MIN"
  - "VDD_MIN=1.71"
  - "VDD_MAX=1.89"
positive_checks:
  - Voltage, temperature, fanout, and both noise margins are present.
  - Noise margins are at least 0.22 V.
refusal_cases:
  - id: cells_omitted_noise_margin
    artifact: mutations/cells/cells_omitted_noise_margin.sp
    reason: cell validity must include explicit high and low noise margins.
trusted_stops:
  - SPICE model calibration is delegated to the lower device-physics claim.
