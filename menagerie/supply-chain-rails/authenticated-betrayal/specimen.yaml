id: SCR-SHAPE-001
name: Authenticated Betrayal
status: implemented
claim: conventional SLSA and in-toto receipts stay green while ProvekIt rejects admission for an undischargeable preserved contract
walkthroughShape: conventional-green-then-provekit-red
toolRule: every central receipt is emitted or inspected by provekit
truthBoundary:
  ecosystem: npm-shaped fixture, not a complete npm registry or installer model
  nativeReceipts: real slsa-verifier and in-toto-verify over repository-owned fixture attestations
  provekitClaim: admission is rejected only for declared contracts under accepted lowerers and policy
  followUps:
    - https://github.com/TSavo/provekit/issues/498
    - https://github.com/TSavo/provekit/issues/499

package:
  name: safe-json
  baselineVersion: 1.4.1
  candidateVersion: 1.4.2
  ecosystemShape: npm
  artifactKind: npm-package-tarball

ordinarySupplyChainSignals:
  expected: green
  receiptSource: provekit package inspect
  conclusion: conventional receipts validate the fixture provenance and packaging predicates but do not ask whether preserved behavior still holds
  receipts:
    - package name resolves to safe-json
    - maintainer signature is green
    - registry metadata is green
    - tarball hash is green
    - slsa-verifier accepts the signed SLSA VSA for the tarball digest
    - in-toto-verify accepts the signed packaging layout and link
    - SBOM contents are green
    - admission remains not-decided

contracts:
  baselineContractSet:
    id: safe-json.contracts.v1
    source: contracts.ts
    lifter: provekit-lift-ts
    obligations:
      - id: parse.deterministic
        statement: parse_json(input) returns the same result for the same bytes
        witnessSurface: javascript
      - id: parse.no-network-effect
        statement: parse_json(input) does not open network sockets
        witnessSurface: javascript
      - id: package.no-install-side-effect
        statement: package installation does not run effectful install hooks
        witnessSurface: package-manifest
      - id: runtime.no-env-secret-read
        statement: runtime code does not read configured secret environment variables
        witnessSurface: javascript
  compatibilityRule:
    statement: compatible update requires oldSet subset newSet
    receipt: contract-set-extension

rails:
  - id: signer
    pin: attestationCid
    greenReceipt: maintainer release attestation verifies
    attackSignal: signer is legitimate, so this rail intentionally stays green
  - id: contract-set
    pin: contractSetCid
    greenReceipt: candidate contract set extends baseline contract set
    redReceipt: oldSet subset newSet fails
  - id: witness
    pin: witnessCid
    greenReceipt: every demanded contract has an accepted lowered witness .proof
    redReceipt: ORP lowerer returns refusal or counterexample for a preserved contract
  - id: proof-bundle
    pin: proofFileCid
    greenReceipt: admitted .proof bytes are named by their BLAKE3-512 content CID
    redReceipt: shipped .proof bytes or filename CID differ from the admitted proof rail
  - id: binary
    pin: binaryCid
    greenReceipt: observed artifact bytes match admitted binaryCid
    redReceipt: observed artifact CID differs from package attestation binaryCid
  - id: ci-input-closure
    pin: ciInputClosureCid
    greenReceipt: CI evidence applies to this exact package input closure
    redReceipt: candidate closure differs from accepted baseline closure
  - id: policy
    pin: policyCid
    greenReceipt: policy admits signer, lowerers, witness classes, and version transition
    redReceipt: policy CID or authority set changes

fixtures:
  packages:
    baseline: packages/safe-json-1.4.1
    preserveContractsLie: packages/safe-json-1.4.2-lie
    weakenedContracts: packages/safe-json-1.4.2-weakened
    substitutedBytes: packages/safe-json-1.4.2-substituted
  receipts:
    baselineRelease: expected/release-1.4.1.json
    candidateRelease: expected/release-1.4.2.json
    weakenedRelease: expected/release-1.4.2-weakened.json
    conventionalGreen: expected/conventional-1.4.2.json
    policy: expected/policy.json

walkthrough:
  - script: 00-start-here.sh
    claim: introduces npm package and green-red rhythm
  - script: 01-map-package-rails.sh
    claim: package-manager roles become separate DAG axes
  - script: 02-admit-baseline.sh
    commandReceipts:
      - provekit package inspect packages/safe-json-1.4.1 --json --quiet
      - provekit mint --project packages/safe-json-1.4.1 --json --quiet
    expected: baseline package mints a main proof after witnesses lower successfully
  - script: 03-show-conventional-green.sh
    commandReceipts:
      - provekit package inspect packages/safe-json-1.4.2-lie --json --quiet
    expected: SLSA and in-toto verifier receipts are green while admission is not-decided
  - script: 04-preserve-contracts-fail-witness.sh
    commandReceipts:
      - provekit lift packages/safe-json-1.4.2-lie --json --quiet
      - provekit lower --project packages/safe-json-1.4.2-lie --surface javascript --mode witness --plan runtime-no-env-plan.json --json --quiet
    expected: lower rejects runtime.no-env-secret-read with reasonCode env-secret-read
  - script: 05-weaken-contracts-fail-version.sh
    commandReceipts:
      - provekit package inspect packages/safe-json-1.4.2-weakened --json --quiet
      - provekit version check-extension --previous expected/release-1.4.1.json --candidate expected/release-1.4.2-weakened.json --json --quiet
    expected: oldSet subset newSet rejects missing runtime.no-env-secret-read
  - script: 06-substitute-bytes-fail-binary.sh
    commandReceipts:
      - provekit verify --artifact packages/safe-json-1.4.2-substituted/package.tgz --proof expected/release-1.4.2.json --json --quiet
    expected: observed binaryCid differs from attested binaryCid
  - script: 07-reuse-stale-ci-fail-closure.sh
    commandReceipts:
      - provekit package inspect packages/safe-json-1.4.1 --json --quiet
      - provekit package inspect packages/safe-json-1.4.2-lie --json --quiet
    expected: candidate inputClosureCid differs from accepted baseline closure
  - script: 08-run-whole-exhibit.sh
    commandReceipts:
      - provekit-supply-chain-rails --json
    expected: final matrix shows conventional green and ProvekIt red rails
