[package]
name = "supply-chain-rails-kit-rpc"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
blake3 = "1"
flate2 = "1"
provekit-canonicalizer = { path = "../../../../implementations/rust/provekit-canonicalizer" }
provekit-claim-envelope = { path = "../../../../implementations/rust/provekit-claim-envelope" }
serde_json = "1"
sha2 = "0.10"
tar = "0.4"

[workspace]

[[bin]]
name = "supply-chain-npm-lifter"
path = "supply-chain-npm-lifter.rs"

[[bin]]
name = "supply-chain-js-lowerer"
path = "supply-chain-js-lowerer.rs"
