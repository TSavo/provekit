id: BZ-OWNERSHIP-001
name: Borrowed Pages as Scratch
kingdom: ownership
status: lab
predicates:
  boundary: borrowed(buf)
  sink: not_aliased(dst, src)
  missingEdge: borrowed(buf) => not_aliased(dst, src)
languages:
  - id: c
    surface: c-assertions
    paths:
      labLibrary: c/lab/library
      labHarness: c/lab/harness
    commands:
      hostCheck:
        cwd: c/lab/harness
        argv: ["./run.sh"]
    exhibits:
      - id: c-assertions
        surface: c-assertions
        harness: c/exhibit/c-assertions/harness
        kitRpc: c/exhibit/c-assertions/kit-rpc
        proofIrFile: c/exhibit/c-assertions/expected.proofir.json
        diagnosticFile: c/exhibit/c-assertions/expected-diagnostic.txt
        fixed:
          harness: c/fixed/c-assertions/harness
          kitRpc: c/fixed/c-assertions/kit-rpc
          proofIrFile: c/fixed/c-assertions/expected.proofir.json
          diagnosticFile: c/fixed/c-assertions/expected-diagnostic.txt
        lossiness:
          erased:
            - C function body scratch-write loop
            - concrete parameter types (char * vs unsigned int)
          preserved:
            - precondition neq(buf, NULL)
            - precondition neq(buf_len, 0)
            - precondition leq(used, buf_len)
    equivalence:
      required: []
    exposure:
      satWitnessFile: c/exhibit/sat-witness.json
    composition:
      checks:
        - id: c-borrowed-buf-non-null-does-not-satisfy-non-aliased
          phase: exhibit
          expected: missing
          witnessSource: lab
          witnessExhibit: c-assertions
          witnessFormula:
            kind: atomic
            name: "≠"
            args:
              - { kind: var, name: buf }
              - { kind: var, name: "NULL" }
          requirementFormula:
            kind: atomic
            name: "≠"
            args:
              - { kind: var, name: dst }
              - { kind: var, name: src }
          assignment:
            buf: 1
          diagnosticFile: c/exhibit/c-assertions/expected-diagnostic.txt
        - id: c-fixed-non-aliased-satisfies-non-aliased
          phase: fixed
          expected: satisfied
          witnessExhibit: c-assertions
          requirementExhibit: c-assertions
          witnessFormula:
            kind: atomic
            name: "≠"
            args:
              - { kind: var, name: dst }
              - { kind: var, name: src }
          requirementFormula:
            kind: atomic
            name: "≠"
            args:
              - { kind: var, name: dst }
              - { kind: var, name: src }
          assignment:
            dst: 1
            src: 0
          diagnosticFile: c/fixed/c-assertions/expected-diagnostic.txt
wildSightings:
  - "CVE-2026-43500: rxkad_verify_packet_1 in net/rxrpc/rxkad.c"
  - "CVE-2026-43500: rxkad_verify_packet_2 in net/rxrpc/rxkad.c (substrate-discovered sibling)"
