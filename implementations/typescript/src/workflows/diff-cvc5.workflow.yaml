# Diff (CVC5 variant) — same pipeline as `provekit diff`, CVC5 as the
# implication-probe solver instead of Z3.
#
# This is what the data-driven solver-configuration story looks like in
# practice: the YAML names the solver. Want Z3? Run `provekit diff`.
# Want CVC5? Run `provekit diff-cvc5`. Future variants
# (`diff-cross-solver` for agreement) are additional YAMLs registered the
# same way.
#
# CVC5 is generally stricter about SMT-LIB conformance and has different
# strengths from Z3 (especially on string and quantified problems).
# Running the same diff through both is the conformance test for the IR's
# SMT translation; agreement = robust verdict, disagreement = either an
# undecidable corner OR a solver bug.
#
# Three stages — identical DAG to diff.workflow.yaml; the only
# difference is the solver field on synthesize.

name: diff-cvc5
cid: bafy-diff-cvc5-v1
description: >-
  Same as provekit diff, with CVC5 as the implication probe solver.
  Demonstrates data-driven solver configuration: choose the workflow,
  choose the solver.

cli:
  description: Show meaning-level changes between two git refs (CVC5 variant)
  args:
    - name: from
      positional: true
      type: string
      default: "HEAD"
    - name: to
      positional: true
      type: string
      default: "WORKING_TREE"
    - name: projectRoot
      type: path
      default: "."

output: $node.synthesize.output

nodes:
  - id: resolve-from
    capability: resolve-invariant-snapshot
    input:
      projectRoot: $input.projectRoot
      ref: $input.from

  - id: resolve-to
    capability: resolve-invariant-snapshot
    input:
      projectRoot: $input.projectRoot
      ref: $input.to

  - id: diff-snapshots
    capability: diff-invariant-snapshots
    input:
      from: $node.resolve-from.output
      to: $node.resolve-to.output

  - id: synthesize
    capability: synthesize-meaning-diff
    input:
      diff: $node.diff-snapshots.output
      solver: cvc5
