# Lint workflow — run the principle library across the project.
#
# Mode 1 (no LLM). Walks projectRoot for .ts/.tsx files, builds SAST in
# a scratch DB, evaluates every .dsl in principlesDir, returns matches.
#
# Single Stage: run-principle-library-lint. No actions, no side effects
# beyond the temp directory the Stage cleans up.

name: lint
cid: bafy-lint-v1
description: >-
  Run the principle library across the project. Walks projectRoot for
  source files, builds SAST in a scratch DB, evaluates every principle,
  returns the principle_matches set.

cli:
  description: Run the principle library across the project (Mode 1, no LLM).
  args:
    - name: projectRoot
      positional: true
      required: false
      type: path
      default: "."
    - name: principlesDir
      flag: true
      type: path
    - name: ci
      flag: true
      type: bool
      default: false
    - name: verbose
      flag: true
      type: bool
      default: false

nodes:
  # ---------------------------------------------------------------------------
  # Run the principle-library scan. Terminal Stage.
  # ---------------------------------------------------------------------------
  - id: lint
    capability: run-principle-library-lint
    input:
      projectRoot: $input.projectRoot
      principlesDir: $input.principlesDir
      drizzleFolder: $input.drizzleFolder
      verbose: $input.verbose

output: $node.lint.output
