# Invariants-list workflow — read the per-codebase invariant store.
#
# Replaces `provekit invariants list` (formerly runInvariants("list") in
# src/cli.ts). Single Stage; no actions. Returns every active invariant,
# or every invariant including retired ones when --all is supplied.

name: invariants-list
cid: bafy-invariants-list-v1
description: >-
  List the per-codebase invariant store. Returns id, kind, callsite,
  retirement status, and originating-bug summary for each entry.

cli:
  description: List the per-codebase invariant store (active by default; --all to include retired).
  args:
    - name: projectRoot
      positional: true
      required: false
      type: path
      default: "."
    - name: all
      flag: true
      type: bool
      default: false

nodes:
  - id: list
    capability: list-invariants
    input:
      projectRoot: $input.projectRoot
      includeRetired: $input.includeRetired

output: $node.list.output
