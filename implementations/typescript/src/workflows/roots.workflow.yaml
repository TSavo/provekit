# Roots workflow — list external CIDs this proofkit references but did not mint.
#
# Pure read; no side effects; no LLM. Computes the set difference: union of
# every local memento's inputCids minus the set of locally-minted CIDs.
# What remains is every claim this proofkit composed against without
# locally verifying. Auditors take this list and traverse externally.
#
# Scope discipline (CRITICAL):
#   protocol/specs/2026-04-29-correctness-is-a-hash.md
#     §"What ProvekIt is" — the framework explicitly does NOT ship a deep
#     verifier. `provekit roots` surfaces the precise audit boundary; the
#     auditor's tooling does the walking.
#     §"Naming discipline: leaves AND roots, not walks" — both queries are
#     LOCAL. Neither walks. The audit-direction query is `provekit roots`;
#     the substrate-vs-tooling boundary is non-negotiable.

name: roots
cid: bafy-roots-v1
description: >-
  List external CIDs this proofkit references but did not mint locally —
  the audit-direction queries. Pure local set-difference; no network walk.
  Output: { format, body } with `body` rendered as text (default) or JSON.

cli:
  description: List external CIDs this proofkit references but did not mint
  args:
    - name: format
      flag: true
      type: string

nodes:
  - id: enumerate-roots
    capability: enumerate-local-roots
    input: {}

  - id: format-output
    capability: format-roots-output
    input:
      roots: $node.enumerate-roots.output.roots
      format: $input.format

output: $node.format-output.output
