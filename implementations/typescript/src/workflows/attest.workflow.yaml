# Attest workflow — produce signed mementos for every invariant in the
# project, identify null roots.
#
# Two Stages and one Action:
#   - scan-invariant-files (Stage): walk the project tree for
#     .invariant.ts files, return their (path, contentHash,
#     resolvedModulePath) triples
#   - verify-project-invariants (Stage): mint a memento per declaration
#     in each invariant file, compose them into a project root memento,
#     identify null roots
#   - write-attest-summary (Action): write the verification output to
#     a JSON file when --out is supplied
#
# The Action is unconditionally part of the workflow; the CLI shim
# either supplies an outPath (full workflow runs) or runs only the
# Stages and renders to stderr (when --out is omitted).

name: attest
cid: bafy-attest-v1
description: >-
  Walk the project's *.invariant.ts files, mint per-declaration mementos,
  compose a project root, identify null roots. Writes an attest summary
  JSON file to outPath.

cli:
  description: Produce signed mementos for project invariants and identify null roots.
  args:
    - name: projectRoot
      positional: true
      required: false
      type: path
      default: "."
    - name: out
      flag: true
      type: path
    - name: ci
      flag: true
      type: bool
      default: false

nodes:
  - id: scan
    capability: scan-invariant-files
    input:
      scanRoot: $input.scanRoot
      projectRoot: $input.projectRoot

  - id: verify
    capability: verify-project-invariants
    input:
      projectName: $input.projectName
      projectVersion: $input.projectVersion
      invariantFiles: $node.scan.output.files
      locallyAvailableCids: $input.locallyAvailableCids

actions:
  - id: write-summary
    action: write-attest-summary
    input:
      summary: $node.verify.output
      projectName: $input.projectName
      projectVersion: $input.projectVersion
      outPath: $input.outPath
    runAfter: $node.verify

output: $node.verify.output
