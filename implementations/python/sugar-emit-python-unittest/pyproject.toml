[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sugar-emit-python-unittest"
version = "0.1.0"
description = "PEP 1.7.0 Python unittest emitter kit: materializes neutral predicates as native unittest assertions"
requires-python = ">=3.11"
dependencies = ["blake3>=1.0.0"]

[project.scripts]
sugar-emit-python-unittest = "sugar_emit_python_unittest.__main__:main"

[tool.pytest.ini_options]
testpaths = ["tests"]

