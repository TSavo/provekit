[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "provekit-emit-python-pytest"
version = "0.1.0"
description = "PEP 1.7.0 Python pytest emitter kit: materializes a contract's neutral predicates as native pytest assertions"
requires-python = ">=3.11"
dependencies = ["blake3>=1.0.0"]

[project.scripts]
provekit-emit-python-pytest = "provekit_emit_python_pytest.__main__:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
