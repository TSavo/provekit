[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "provekit-realize-python-core"
version = "0.1.0"
description = "PEP 1.7.0 Python realize kit for ProvekIt bind canonical output"
requires-python = ">=3.11"
dependencies = [
    "blake3>=0.3.0",
]

[project.scripts]
provekit-realize-python = "provekit_realize_python_core.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/provekit_realize_python_core"]

[tool.hatch.build.targets.wheel.force-include]
"../../../menagerie/python-language-signature/specs/body-templates/python-canonical-bodies.json" = "provekit_realize_python_core/body_templates/python-canonical-bodies.json"
"../../../menagerie/python-language-signature/specs/body-templates/python-canonical-bodies-libprovekit.json" = "provekit_realize_python_core/body_templates/python-canonical-bodies-libprovekit.json"
"../../../menagerie/python-language-signature/specs/body-templates/python-canonical-bodies-rust-runtime.json" = "provekit_realize_python_core/body_templates/python-canonical-bodies-rust-runtime.json"
"../../../menagerie/python-language-signature/specs/body-templates/python-canonical-bodies-blake3.json" = "provekit_realize_python_core/body_templates/python-canonical-bodies-blake3.json"

[tool.pytest.ini_options]
testpaths = ["tests"]
