[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sugar-lift-py-tests"
version = "0.1.0"
description = "Sugar: Python pytest/unittest structural lifts plus production callsite WP walking."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.8"
authors = [{ name = "Sugar" }]
dependencies = [
    "blake3>=0.3.0",
    "pynacl>=1.5",
    "cbor2>=5.4",
]

[project.optional-dependencies]
test = ["pytest>=7"]

[project.scripts]
sugar-lsp-python = "sugar_lift_py_tests.lsp:main"
sugar-lift-python = "sugar_lift_py_tests.lsp:main"
# The persistent editor language server (LSP wire protocol; renders `sugar
# prove` as red squiggles). Distinct from the batch lift plugin above.
sugar-editor-lsp-python = "sugar_lift_py_tests.editor_lsp:main"

[tool.setuptools.packages.find]
where = ["src"]
