[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
[project]
name = "provekit-lift-py-pytest-witness"
version = "0.1.0"
description = "pytest witness lifter — k(I)=t execution-witness proofchain links"
requires-python = ">=3.10"
dependencies = ["provekit-lift-py-tests"]
[project.scripts]
provekit-pytest-witness-discharge = "provekit_pytest_witness.discharge_cli:main"

[tool.setuptools.packages.find]
where = ["src"]
