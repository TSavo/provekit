[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "provekit-lift-py-numpy-testing"
version = "0.1.0"
description = "ProvekIt lift seat for the numpy.testing assertion vocabulary"
requires-python = ">=3.10"
# Reuses the pytest seat's shared term/formula machinery.
dependencies = ["provekit-lift-py-tests"]

[tool.setuptools.packages.find]
where = ["src"]
