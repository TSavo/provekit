[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "provekit-lift-python-source"
version = "0.1.0"
description = "ProvekIt Python source-language lifter over a python: operation algebra."
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "ProvekIt" }]
dependencies = [
    "blake3>=0.3.0",
]

[project.optional-dependencies]
test = ["pytest>=7"]

[project.scripts]
provekit-lift-python-source = "provekit_lift_python_source.rpc:main"
provekit-bind-lift-python = "provekit_lift_python_source.bind_rpc:main"
provekit-lift-python-verify = "provekit_lift_python_source.verify_rpc:main"

[tool.setuptools.packages.find]
where = ["src"]
