[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
[project]
name = "sugar-lift-py-pytest-witness"
version = "0.1.0"
description = "pytest witness lifter — k(I)=t execution-witness proofchain links"
requires-python = ">=3.10"
dependencies = ["sugar-lift-py-tests"]
[project.scripts]
sugar-pytest-witness-discharge = "sugar_pytest_witness.discharge_cli:main"

[tool.setuptools.packages.find]
where = ["src"]
