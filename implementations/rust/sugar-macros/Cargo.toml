[package]
name = "sugar-macros"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "ProvekIt: #[provekit::contract(...)], #[provekit::implement(...)], and #[provekit::verify] attribute macros. Decorator-style authoring surface for the Rust kit."

[lib]
proc-macro = true

[dependencies]
syn = { workspace = true }
quote = { workspace = true }
proc-macro2 = { workspace = true }

[dev-dependencies]
sugar-ir-symbolic = { path = "../sugar-ir-symbolic" }
sugar-macros-rt = { path = "../sugar-macros-rt" }
trybuild = { workspace = true }

[[example]]
name = "macro_smoke"
path = "../examples/macro_smoke.rs"
