[package]
name = "sugar-walk"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Sugar walk: backward WP propagation from callsites to allocations over Rust source. Issue #368 launch demo."

[lib]
name = "sugar_walk"
path = "src/lib.rs"

[[bin]]
name = "sugar-walk-demo"
path = "src/bin/walk_demo.rs"

[[bin]]
name = "sugar-walk-emit"
path = "src/bin/walk_emit.rs"

[[bin]]
name = "sugar-walk-rpc"
path = "src/bin/walk_rpc.rs"
required-features = ["rpc"]

[features]
default = ["rpc"]
rpc = []

[dependencies]
syn = { workspace = true }
quote = { workspace = true }
proc-macro2 = { version = "1", features = ["span-locations"] }
prettyplease = "0.2"
sugar-ir-types = { path = "../sugar-ir-types" }
sugar-lift-contracts = { path = "../sugar-lift-contracts" }
sugar-canonicalizer = { path = "../sugar-canonicalizer" }
sugar-claim-envelope = { path = "../sugar-claim-envelope" }
sugar-proof-envelope = { path = "../sugar-proof-envelope" }
libsugar = { path = "../libsugar" }
serde_json = { workspace = true }
base64 = { workspace = true }
thiserror = { workspace = true }
toml = { workspace = true }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
