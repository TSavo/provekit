# SPDX-License-Identifier: Apache-2.0
#
# PEP 1.7.0 `kind = "lift"` plugin manifest for the Rust implications surface.
#
# Third lift surface (sugar + tests + implications). Walks production code
# function bodies; for every Expr::Call and Expr::MethodCall, emits a
# kind:bridge memento that pins the call site (sourceSymbol = callee ident)
# to a contract resolved from the supplied contract_bindings by ctor-name
# index. Without this surface, enumerate_callsites in the verifier walks
# the loaded contracts looking for ctor refs that match bridges_by_symbol
# and finds nothing for crates whose only contracts are test-lifted
# (no vendor recognize pass). With this surface, intra-crate calls
# become enumerable callsites.
#
# Same binary as rust-bind / rust-contracts (sugar-walk-rpc owns the
# syn AST machinery for all three rust lift lanes). The `method` field
# tells mint to call the implication lift route instead of the default `lift`.
name = "rust-implications-lift"
command = ["../target/debug/sugar-walk-rpc", "--rpc"]
working_dir = "."
method = "sugar.plugin.lift_implications"
phase = "consumer"
