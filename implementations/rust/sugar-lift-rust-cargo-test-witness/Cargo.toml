[package]
name = "sugar-lift-rust-cargo-test-witness"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "ProvekIt cargo-test WITNESS lifter: run a crate's tests, content-address the per-test pass/fail outcomes into ONE witness-package bundle, and emit a signed WitnessPackageMemento + custom-evidence contract. Rust parity for the python pytest-witness kit."

[lib]
doctest = false

[dependencies]
sugar-ir-symbolic = { path = "../sugar-ir-symbolic" }
sugar-ir-types = { path = "../sugar-ir-types" }
sugar-canonicalizer = { path = "../sugar-canonicalizer" }
sugar-proof-envelope = { path = "../sugar-proof-envelope" }
serde_json = { workspace = true }
base64 = { workspace = true }

[[bin]]
name = "witness_rpc"
path = "src/bin/witness_rpc.rs"

[[bin]]
name = "discharge_cli"
path = "src/bin/discharge_cli.rs"

[dev-dependencies]
