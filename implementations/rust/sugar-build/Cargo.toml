[package]
name = "sugar-build"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "ProvekIt build-script integration: turns contract violations into compile-time errors via cargo:warning= / compile_error!. Consumer crates add a 4-line Cargo.toml + build.rs hook and the verifier runs as part of cargo build."

[lib]
name = "sugar_build"
path = "src/lib.rs"

[dependencies]
# `visit` feature is required so we can implement
# `syn::visit::Visit` to traverse parsed source files.
syn = { version = "2", features = ["full", "extra-traits", "visit"] }
# `span-locations` enables `Span::start()` so the build-script
# verifier can report a useful source line for each call site.
proc-macro2 = { version = "1", features = ["span-locations"] }
quote = { workspace = true }
walkdir = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
toml = "0.8"
glob = "0.3"
blake3 = { workspace = true }

# IR types + the ir-document deserializer (`parse::parse_document`) used to
# turn the RPC kit's ir-document back into `Vec<ContractDecl>`.
sugar-ir-symbolic = { path = "../sugar-ir-symbolic" }

# THE SEVER: contract lifting goes OVER RPC (the `contracts_rpc` kit) via the
# shared leaf client, NOT a static link of `sugar-lift-contracts`. The
# client is serde_json + std only, so the build crate stays free of both the
# lifter and the proof/crypto stack its own comment warns against.
sugar-lift-rpc-client = { path = "../sugar-lift-rpc-client" }

[dev-dependencies]
tempfile = "3"
