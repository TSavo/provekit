[package]
name = "provekit-baseline-rust-std"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "ProvekIt: foundation-baseline catalog for Rust's std library (advisory)."

[dependencies]
provekit-canonicalizer = { path = "../provekit-canonicalizer" }
provekit-claim-envelope = { path = "../provekit-claim-envelope" }
provekit-ir-symbolic = { path = "../provekit-ir-symbolic" }
provekit-proof-envelope = { path = "../provekit-proof-envelope" }
serde_json = { workspace = true }

[dev-dependencies]
provekit-verifier = { path = "../provekit-verifier" }

[[bin]]
name = "mint-rust-std-baseline"
path = "src/bin/mint-rust-std-baseline.rs"
