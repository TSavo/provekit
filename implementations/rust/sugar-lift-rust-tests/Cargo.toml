[package]
name = "sugar-lift-rust-tests"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Sugar Rust test-assertion consistency lifter: lift #[test] scalar assertions into inv-only closed consistency contracts."

[lib]
doctest = false

[dependencies]
sugar-ir-symbolic = { path = "../sugar-ir-symbolic" }
syn = { workspace = true }
quote = { workspace = true }
proc-macro2 = { workspace = true }
serde_json = { workspace = true }
walkdir = { workspace = true }

[[bin]]
name = "rust_test_assertions_rpc"
path = "src/bin/rust_test_assertions_rpc.rs"
