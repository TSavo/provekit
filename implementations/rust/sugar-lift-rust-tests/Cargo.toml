[package]
name = "sugar-lift-rust-tests"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Sugar Rust test-assertion consistency lifter: lift #[test] scalar assertions into inv-only closed consistency contracts."

[lib]
doctest = false

[dev-dependencies]
# Step-7 composition check: feed emitted ProofIR through the real prove compiler.
sugar-ir-compiler-smt-lib = { path = "../sugar-ir-compiler-smt-lib" }

[dependencies]
sugar-ir-symbolic = { path = "../sugar-ir-symbolic" }
sugar-canonicalizer = { path = "../sugar-canonicalizer" }
# Oracle slice: query the resident RA host (sugar-linkerd) for method-call
# receiver/param mutability over RPC.
sugar-walk = { path = "../sugar-walk" }
syn = { workspace = true }
quote = { workspace = true }
proc-macro2 = { workspace = true, features = ["span-locations"] }
serde_json = { workspace = true }
toml = { workspace = true }
walkdir = { workspace = true }

[[bin]]
name = "rust_test_assertions_rpc"
path = "src/bin/rust_test_assertions_rpc.rs"

[[bin]]
name = "coretests_sweep"
path = "src/bin/coretests_sweep.rs"
