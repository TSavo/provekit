[package]
name = "provekit-walk"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "ProvekIt walk: backward WP propagation from callsites to allocations over Rust source. Issue #368 launch demo."

[lib]
name = "provekit_walk"
path = "src/lib.rs"

[[bin]]
name = "provekit-walk-demo"
path = "src/bin/walk_demo.rs"

[[bin]]
name = "provekit-walk-emit"
path = "src/bin/walk_emit.rs"

[[bin]]
name = "provekit-walk-rpc"
path = "src/bin/walk_rpc.rs"
required-features = ["rpc"]

[features]
default = ["rpc"]
rpc = ["provekit-realize-rust-core"]

[dependencies]
syn = { workspace = true }
quote = { workspace = true }
proc-macro2 = { version = "1", features = ["span-locations"] }
prettyplease = "0.2"
provekit-ir-types = { path = "../provekit-ir-types" }
provekit-lift-contracts = { path = "../provekit-lift-contracts" }
provekit-canonicalizer = { path = "../provekit-canonicalizer" }
provekit-claim-envelope = { path = "../provekit-claim-envelope" }
provekit-proof-envelope = { path = "../provekit-proof-envelope" }
libprovekit = { path = "../libprovekit" }
provekit-realize-rust-core = { path = "../provekit-realize-rust-core", optional = true }
serde_json = { workspace = true }
base64 = { workspace = true }
thiserror = { workspace = true }
toml = { workspace = true }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
