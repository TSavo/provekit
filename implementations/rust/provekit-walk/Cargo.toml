[package]
name = "provekit-walk"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "ProvekIt walk: backward WP propagation from callsites to allocations over Rust source. Issue #368 launch demo."

[lib]
name = "provekit_walk"
path = "src/lib.rs"

[[bin]]
name = "provekit-walk-demo"
path = "src/bin/walk_demo.rs"

[[bin]]
name = "provekit-walk-emit"
path = "src/bin/walk_emit.rs"

[[bin]]
name = "provekit-walk-rpc"
path = "src/bin/walk_rpc.rs"

# Conventional alias so the kit-dispatch resolver (which looks for
# `provekit-bind-lift-<source_lang>` per its `provekit-bind-lift-{lang}`
# convention) finds the Rust lift kit by the same name shape every other
# language uses. The same source file produces both binaries.
# This eliminates the substrate-uniform-pattern violation that previously
# special-cased `if source_lang == "rust"` in kit_dispatch::builtin_lift_candidates.
[[bin]]
name = "provekit-bind-lift-rust"
path = "src/bin/walk_rpc.rs"

[dependencies]
syn = { workspace = true }
quote = { workspace = true }
proc-macro2 = { version = "1", features = ["span-locations"] }
prettyplease = "0.2"
provekit-ir-types = { path = "../provekit-ir-types" }
provekit-lift-contracts = { path = "../provekit-lift-contracts" }
provekit-canonicalizer = { path = "../provekit-canonicalizer" }
provekit-claim-envelope = { path = "../provekit-claim-envelope" }
provekit-proof-envelope = { path = "../provekit-proof-envelope" }
libprovekit = { path = "../libprovekit" }
serde_json = { workspace = true }
base64 = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
