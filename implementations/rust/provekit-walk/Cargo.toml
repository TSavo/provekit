[package]
name = "provekit-walk"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "ProvekIt walk: backward WP propagation from callsites to allocations over Rust source. Issue #368 launch demo."

[lib]
name = "provekit_walk"
path = "src/lib.rs"

[[bin]]
name = "provekit-walk-demo"
path = "src/bin/walk_demo.rs"

[[bin]]
name = "provekit-walk-emit"
path = "src/bin/walk_emit.rs"

[[bin]]
name = "provekit-walk-rpc"
path = "src/bin/walk_rpc.rs"

[dependencies]
syn = { workspace = true }
quote = { workspace = true }
proc-macro2 = { version = "1", features = ["span-locations"] }
provekit-ir-types = { path = "../provekit-ir-types" }
provekit-canonicalizer = { path = "../provekit-canonicalizer" }
provekit-claim-envelope = { path = "../provekit-claim-envelope" }
provekit-proof-envelope = { path = "../provekit-proof-envelope" }
libprovekit = { path = "../libprovekit" }
serde_json = { workspace = true }
base64 = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
