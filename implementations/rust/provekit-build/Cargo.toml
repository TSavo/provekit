[package]
name = "provekit-build"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "ProvekIt build-script integration: turns contract violations into compile-time errors via cargo:warning= / compile_error!. Consumer crates add a 4-line Cargo.toml + build.rs hook and the verifier runs as part of cargo build."

[lib]
name = "provekit_build"
path = "src/lib.rs"

[dependencies]
# `visit` feature is required so we can implement
# `syn::visit::Visit` to traverse parsed source files.
syn = { version = "2", features = ["full", "extra-traits", "visit"] }
# `span-locations` enables `Span::start()` so the build-script
# verifier can report a useful source line for each call site.
proc-macro2 = { version = "1", features = ["span-locations"] }
quote = { workspace = true }
walkdir = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
toml = "0.8"
glob = "0.3"
blake3 = { workspace = true }

# IR types — `lift_file()` returns Vec<ContractDecl> from this crate.
provekit-ir-symbolic = { path = "../provekit-ir-symbolic" }

# Lift adapters. We pull each adapter in directly (NOT the heavier
# `provekit-lift` core, which would drag the claim-envelope + proof-envelope
# crypto stack into every consumer's build-dependency graph). The adapters
# are leaf libraries that only need `syn` + the IR types.
provekit-lift-proptest    = { path = "../provekit-lift-proptest" }
provekit-lift-contracts   = { path = "../provekit-lift-contracts" }
provekit-lift-kani        = { path = "../provekit-lift-kani" }
provekit-lift-prusti      = { path = "../provekit-lift-prusti" }
provekit-lift-creusot     = { path = "../provekit-lift-creusot" }
provekit-lift-flux        = { path = "../provekit-lift-flux" }
provekit-lift-quickcheck  = { path = "../provekit-lift-quickcheck" }
provekit-lift-verus       = { path = "../provekit-lift-verus" }

[dev-dependencies]
tempfile = "3"
