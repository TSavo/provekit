[package]
name = "provekit-verifier"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "ProvekIt: six-stage verifier pipeline (load, enumerate, resolve, instantiate, smt-emit, solve, report)."

[dependencies]
provekit-canonicalizer = { path = "../provekit-canonicalizer" }
provekit-ir-types = { path = "../provekit-ir-types" }
provekit-proof-envelope = { path = "../provekit-proof-envelope" }
libprovekit = { path = "../libprovekit" }
provekit-ir-compiler-smt-lib = { path = "../provekit-ir-compiler-smt-lib" }
provekit-ir-compiler = { path = "../provekit-ir-compiler" }
provekit-ir-compiler-coq = { path = "../provekit-ir-compiler-coq" }
provekit-ir-compiler-maude = { path = "../provekit-ir-compiler-maude" }
provekit-ir-compiler-lean = { path = "../provekit-ir-compiler-lean" }
serde = { workspace = true }
serde_json = { workspace = true }
walkdir = { workspace = true }
rayon = { workspace = true }
thiserror = { workspace = true }
toml = "0.8"
chrono = { version = "0.4", features = ["clock"] }
tracing = "0.1"

[dev-dependencies]
provekit-claim-envelope = { path = "../provekit-claim-envelope" }
provekit-ir-symbolic = { path = "../provekit-ir-symbolic" }
tracing-subscriber = { version = "0.3", features = ["fmt"] }

[[example]]
name = "rust_round_trip"
path = "../examples/rust_round_trip.rs"

[[example]]
name = "cross_lang_consume"
path = "../examples/cross_lang_consume.rs"

[[example]]
name = "stage4_driver"
path = "../../../examples/stage4-handshake-demo/stage4_driver.rs"

[[example]]
name = "multi_solver_demo"
path = "../../../examples/multi-solver-demo/multi_solver_driver.rs"
