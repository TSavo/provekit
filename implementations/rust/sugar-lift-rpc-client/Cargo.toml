[package]
name = "sugar-lift-rpc-client"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Sugar: minimal leaf client that locates and drives the rust-contracts lift kit (`contracts_rpc`) over NDJSON, returning the raw ir-document. Used by sugar-lift / -build / -lsp-rust to reach the contract lifter via RPC instead of statically linking it."

# TRUE LEAF: serde_json + std ONLY. This crate exists so the substrate's
# in-process callers (sugar-lift, sugar-build, sugar-lsp-rust) all
# resolve and invoke the `contracts_rpc` kit IDENTICALLY (same bin-path
# resolver, same NDJSON drive), without any of them statically linking
# `sugar-lift-contracts` and without dragging the proof/crypto stack
# (libsugar's LiftPluginKit) into the leaf build/lsp crates.
[dependencies]
serde_json = { workspace = true }
