[package]
name = "provekit-linkerd"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Long-running JSON-RPC daemon that serves the provekit linker to per-kit LSP plugins. Implements spec 2026-05-04-linker-daemon-protocol.md."

[[bin]]
name = "provekit-linkerd"
path = "src/main.rs"

[dependencies]
provekit-linker = { path = "../provekit-linker" }
provekit-lift = { path = "../provekit-lift" }
provekit-canonicalizer = { path = "../provekit-canonicalizer" }
provekit-ir-symbolic = { path = "../provekit-ir-symbolic" }
provekit-claim-envelope = { path = "../provekit-claim-envelope" }
# Resident rust-analyzer host: import the shared RA LSP client (`ra_oracle`) so
# the daemon drives the SAME framing/quiescence/resolve logic the per-mint binary
# used to cold-spawn. `default-features = false` keeps the heavy `rpc`/realize
# feature out of the daemon; `ra_oracle` needs only serde_json/tracing/std.
provekit-walk = { path = "../provekit-walk", default-features = false }

serde = { workspace = true }
serde_json = { workspace = true }

tokio = { version = "1", features = ["rt-multi-thread", "net", "io-util", "time", "sync", "macros", "fs"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
# Walk the workspace .rs tree to fold cross-file source state into the
# resolution-context cache key (see resolve_cache::resolution_context_cid).
walkdir = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "net", "io-util", "time", "sync", "macros", "fs"] }
