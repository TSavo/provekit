[package]
name = "libprovekit-rpc-cross-platform"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "Cross-platform sibling of libprovekit-rpc. Same code; each function annotated with #[provekit::sugar] / #[provekit::boundary] / #[provekit::refuse]. The annotations declare what each function realizes at the concept hub (sugar) and which external libraries it binds to (boundary). When materialized to another language, the realize plugin reads the boundary annotations and substitutes the per-target sister library at each boundary callsite; interior @sugar code passes through. This is the canonical form for cross-language federation of the substrate's own infrastructure."

# Same external-crate-only deps as the cleanroom, PLUS provekit-sugar
# for the annotation proc-macros (compile-time no-op; meaning is at the
# lift-time recognizer, not at compile time). When materialized to TS /
# Python / Java, this crate's annotations drive per-target library
# substitution; the proc-macro dep itself does not transit.
[dependencies]
# Cross-platform spec: signatures + @sugar/@boundary/@refuse annotations
# only. No real bodies; boundary functions are `unimplemented!()`. The
# annotations name the SHIMS that realize each concept; materialize
# substitutes the per-target shim's implementation at codegen time.
# This crate does NOT execute. It's a SOURCE for cross-language
# realization, not a runtime artifact.
serde_json = { version = "1", features = ["preserve_order"] }
provekit = { package = "provekit-sugar", path = "../provekit-sugar" }
