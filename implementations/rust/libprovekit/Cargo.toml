[package]
name = "libprovekit"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "ProvekIt Rust reference library for protocol workflows."

[lib]
# `lib` keeps the in-workspace Rust consumers (provekit-cli, walk,
# verifier, future Rust lifters) compiling unchanged. `cdylib` and
# `staticlib` add the C-linkable artifacts the C lifter family
# (provekit-lift-c-kernel-doc, provekit-lift-c-sparse, etc.) needs
# per CCP §6.2.
crate-type = ["lib", "cdylib", "staticlib"]

[dependencies]
provekit-canonicalizer = { path = "../provekit-canonicalizer" }
provekit-proof-envelope = { path = "../provekit-proof-envelope" }
provekit-ir-types = { path = "../provekit-ir-types" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
# The d7_* loss-record tests call provekit_realize_rust_core::emit_from_resolved_*.
# Previously linked transitively via the (now-removed) libprovekit-rpc-cross-platform
# workspace member; declare it explicitly so the test build links it regardless of
# the rest of the workspace graph.
provekit-realize-rust-core = { path = "../provekit-realize-rust-core" }
