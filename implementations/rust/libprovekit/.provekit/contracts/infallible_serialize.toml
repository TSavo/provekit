#
# Rust-kit manifest for serde_json Result totality that is specific to
# libprovekit's own types. The Rust kit reads this as side metadata during
# lifting; the CLI/verifier receive only the emitted contract/bridge IR over RPC.

[[serde_json]]
function = "to_value"
type_crate = "libprovekit"
type_name = "RealizedSource"
contract = "serde_json_to_value__realized_source"
reason = "RealizedSource derives Serialize over serde_json-infallible fields: strings, bools, options, vectors, and serde_json::Value"

[[serde_json]]
function = "to_string"
type_crate = "libprovekit"
type_name = "Sort"
contract = "serde_json_to_string__sort"
reason = "Sort derives Serialize over enum variants containing strings, u8, Vec<Sort>, and Box<Sort>; serialization Result has no custom error path"

[[serde_json]]
function = "to_value"
type_crate = "libprovekit"
type_name = "Dialect"
contract = "serde_json_to_value__dialect"
reason = "Dialect derives Serialize over simple enum variants and Other(String)"

[[serde_json]]
function = "to_value"
type_crate = "libprovekit"
type_name = "Term"
contract = "serde_json_to_value__term"
reason = "Term derives Serialize over Cid-as-string, strings, Vec<Term>, serde_json::Value, and Sort"
