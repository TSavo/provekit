[package]
name = "provekit-lsp"
version = "0.1.0"
edition = "2021"
authors = ["ProvekIt Contributors"]
description = "Language Server Protocol implementation for ProvekIt. Delegates verification to configurable JSON-RPC backends."
license = "Apache-2.0"

[[bin]]
name = "provekit-lsp"
path = "src/main.rs"

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { version = "1.43", features = ["rt-multi-thread", "macros", "io-std", "io-util", "process", "sync"] }
tower-lsp = "0.20"
syn = { version = "2.0", features = ["full", "visit"] }
quote = "1"
proc-macro2 = { version = "1.0", features = ["span-locations"] }
toml = "0.8"
walkdir = "2.5"
provekit-lsp-rust = { path = "../provekit-lsp-rust" }

[dev-dependencies]
tempfile = "3.14"
libc = "0.2"
