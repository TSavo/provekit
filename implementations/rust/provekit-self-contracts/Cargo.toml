[package]
name = "provekit-self-contracts"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "ProvekIt: self-applied contracts for the Rust impl's IR-JSON parser. Dogfooding."

[dependencies]
provekit-canonicalizer = { path = "../provekit-canonicalizer" }
provekit-claim-envelope = { path = "../provekit-claim-envelope" }
