[package]
name = "provekit-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "ProvekIt user-facing CLI: prove / verify / hash / dump / search / ask / init."

[[bin]]
name = "provekit"
path = "src/main.rs"

[dependencies]
# Workspace-internal libs.
provekit-canonicalizer = { path = "../provekit-canonicalizer" }
provekit-proof-envelope = { path = "../provekit-proof-envelope" }
provekit-claim-envelope = { path = "../provekit-claim-envelope" }
provekit-ir-symbolic = { path = "../provekit-ir-symbolic" }
provekit-verifier = { path = "../provekit-verifier" }
provekit-agent = { path = "../provekit-agent" }
provekit-lift = { path = "../provekit-lift" }
provekit-linker = { path = "../provekit-linker" }
provekit-self-contracts = { path = "../provekit-self-contracts" }

# External.
clap = { version = "4", features = ["derive"] }
anyhow = "1"
owo-colors = "4"
serde = { workspace = true }
serde_json = { workspace = true }
walkdir = { workspace = true }
thiserror = { workspace = true }
base64 = { workspace = true }

[dev-dependencies]
provekit-linker = { path = "../provekit-linker" }
