[package]
name = "provekit-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "ProvekIt user-facing CLI: prove / verify / hash / dump / search / ask / init."

[[bin]]
name = "provekit"
path = "src/main.rs"

[dependencies]
# Workspace-internal libs.
provekit-canonicalizer = { path = "../provekit-canonicalizer" }
provekit-proof-envelope = { path = "../provekit-proof-envelope" }
provekit-claim-envelope = { path = "../provekit-claim-envelope" }
provekit-ir-symbolic = { path = "../provekit-ir-symbolic" }
provekit-verifier = { path = "../provekit-verifier" }
provekit-agent = { path = "../provekit-agent" }
provekit-lift = { path = "../provekit-lift" }
provekit-linker = { path = "../provekit-linker" }
provekit-mint-amp = { path = "../provekit-mint-amp" }
provekit-self-contracts = { path = "../provekit-self-contracts" }
libprovekit = { path = "../libprovekit" }
provekit-ir-types = { path = "../provekit-ir-types" }
provekit-ir-compiler = { path = "../provekit-ir-compiler" }
provekit-ir-compiler-coq = { path = "../provekit-ir-compiler-coq" }
provekit-ir-compiler-smt-lib = { path = "../provekit-ir-compiler-smt-lib" }
provekit-lift-contracts = { path = "../provekit-lift-contracts" }
syn = { workspace = true }

# External.
clap = { version = "4", features = ["derive"] }
anyhow = "1"
owo-colors = "4"
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = "0.9"
walkdir = { workspace = true }
thiserror = { workspace = true }
base64 = { workspace = true }

[dev-dependencies]
provekit-linker = { path = "../provekit-linker" }
serial_test = "3"
tempfile = "3"
