[package]
name = "provekit-lift"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "ProvekIt lift toolchain: walk a Rust workspace, run all registered adapters, mint signed contract mementos, bundle into a single .proof catalog."

[lib]
name = "provekit_lift"
path = "src/lib.rs"
# This crate has no doctest examples; the full release workspace run only
# builds an empty rustdoc harness, which can fail while relinking workspace rlibs.
doctest = false

# `cargo provekit-lift` invokes the binary named `cargo-provekit-lift`,
# which Cargo resolves on PATH. We also publish a plain `provekit-lift`
# entrypoint for direct invocation. Both binaries dispatch into the
# same `run_cli` library function.
[[bin]]
name = "cargo-provekit-lift"
path = "src/bin/cargo-provekit-lift.rs"

[[bin]]
name = "provekit-lift"
path = "src/bin/provekit-lift.rs"

[dependencies]
# Workspace-internal libs.
provekit-canonicalizer = { path = "../provekit-canonicalizer" }
provekit-proof-envelope = { path = "../provekit-proof-envelope" }
provekit-claim-envelope = { path = "../provekit-claim-envelope" }
provekit-ir-symbolic = { path = "../provekit-ir-symbolic" }
libprovekit = { path = "../libprovekit" }

# THE SEVER: the rust-contracts lifter is no longer statically linked.
# `lift_path` dispatches it over RPC (the `contracts_rpc` kit) through this
# shared leaf client, then deserializes the ir-document via
# `provekit-ir-symbolic::parse::parse_document`. `provekit-lift-contracts`
# is now a DEV-dependency only (tests still exercise `lift_file` directly).
provekit-lift-rpc-client = { path = "../provekit-lift-rpc-client" }

# External.
syn = { workspace = true }
proc-macro2 = { workspace = true }
quote = { workspace = true }
walkdir = { workspace = true }
thiserror = { workspace = true }
serde_json = { workspace = true }
base64 = { workspace = true }

[dev-dependencies]
provekit-verifier = { path = "../provekit-verifier" }
# Tests exercise the lifter's `lift_file` directly (call_edges.rs,
# end_to_end.rs) — that is the sanctioned way to keep lifter-behavior
# coverage without spawning RPC inside a unit test. Production code paths
# reach the lifter only over RPC (see the dependency note above).
provekit-lift-contracts = { path = "../provekit-lift-contracts" }
