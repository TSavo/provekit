[package]
name = "provekit-lift"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "ProvekIt lift toolchain: walk a Rust workspace, run all registered adapters, mint signed contract mementos, bundle into a single .proof catalog."

[lib]
name = "provekit_lift"
path = "src/lib.rs"

# `cargo provekit-lift` invokes the binary named `cargo-provekit-lift`,
# which Cargo resolves on PATH. We also publish a plain `provekit-lift`
# entrypoint for direct invocation. Both binaries dispatch into the
# same `run_cli` library function.
[[bin]]
name = "cargo-provekit-lift"
path = "src/bin/cargo-provekit-lift.rs"

[[bin]]
name = "provekit-lift"
path = "src/bin/provekit-lift.rs"

[dependencies]
# Workspace-internal libs.
provekit-canonicalizer = { path = "../provekit-canonicalizer" }
provekit-proof-envelope = { path = "../provekit-proof-envelope" }
provekit-claim-envelope = { path = "../provekit-claim-envelope" }
provekit-ir-symbolic = { path = "../provekit-ir-symbolic" }

# Adapter crates (each owns its own shape walker).
provekit-lift-proptest = { path = "../provekit-lift-proptest" }
provekit-lift-contracts = { path = "../provekit-lift-contracts" }
provekit-lift-kani = { path = "../provekit-lift-kani" }
provekit-lift-prusti = { path = "../provekit-lift-prusti" }
provekit-lift-creusot = { path = "../provekit-lift-creusot" }
provekit-lift-flux = { path = "../provekit-lift-flux" }
provekit-lift-quickcheck = { path = "../provekit-lift-quickcheck" }
provekit-lift-verus = { path = "../provekit-lift-verus" }
provekit-lift-rust-tests = { path = "../provekit-lift-rust-tests" }

# External.
syn = { workspace = true }
proc-macro2 = { workspace = true }
quote = { workspace = true }
walkdir = { workspace = true }
thiserror = { workspace = true }
serde_json = { workspace = true }
base64 = { workspace = true }

[dev-dependencies]
provekit-verifier = { path = "../provekit-verifier" }
