name = "rust-cargo-test-witness-lift"
version = "0.1.0-draft"
protocol_version = "pep/1.7.0"
kind = "lift"
# The kit's lift entry (runs `cargo test`, emits the witnessed contract + memento).
# /Users/tsavo/sugar/.worktrees/python-proven-case-1-nullguard-20260603/implementations/rust/target/debug is substituted by run.sh with the absolute path to the built binaries.
command = ["/Users/tsavo/sugar/.worktrees/python-proven-case-1-nullguard-20260603/implementations/rust/target/debug/witness_rpc"]
# The kit's DISCHARGE entry (re-runs the suite to settle the custom evidence).
# `witness_tool` keys the per-tool registry: prove exports this as
# SUGAR_WITNESS_DISCHARGE_CARGO_TEST and the verifier routes the certificate's
# tool="cargo-test" to it.
discharge_command = ["/Users/tsavo/sugar/.worktrees/python-proven-case-1-nullguard-20260603/implementations/rust/target/debug/discharge_cli"]
witness_tool = "cargo-test"
# The kit's WITNESS-RESOLVE entry. Verification lives in the rust CLI; the kit
# oracle is UNTRUSTED. Over `sugar.plugin.resolve_witness` it only RESOLVES a
# witness body (from the package, or by re-running) and hands back the bytes -- no
# verdict. The rust verifier blake3's those bytes itself.
resolve_witness_command = ["/Users/tsavo/sugar/.worktrees/python-proven-case-1-nullguard-20260603/implementations/rust/target/debug/witness_rpc"]
resolve_witness_method = "sugar.plugin.resolve_witness"
working_dir = "."

[capabilities]
authoring_surfaces = ["rust-cargo-test-witness"]
