# Sugar project config for the receipt-1 test-assertion consistency
# fixture. The lift surface dispatches the PYTEST lifter
# (sugar_lift_py_tests.lsp), which lifts multi-assertion test bodies into
# conjoined `inv` contracts. Resolved through
# .sugar/lift/python-tests/manifest.toml.

[[plugins]]
name = "python-tests-lift"
kind = "lift"
surface = "python-tests"

[solvers]
default = "z3"

[solvers.dispatch]
linear_arithmetic = "z3"
default = "z3"

[solvers.z3]
binary = "z3"
flags = ["-smt2", "-in"]
