name = "python-tests-lift"
version = "0.1.0-draft"
protocol_version = "pep/1.7.0"
kind = "lift"
# Dispatch the PYTEST lifter (provekit_lift_py_tests.lsp main loop, NDJSON
# over stdio). PYTHONPATH points at the lifter source tree so no install /
# venv is required. working_dir is the project root (the examples dir),
# resolved relative to the repo root the manifest discovery uses.
command = [
    "/usr/bin/env",
    "PYTHONPATH=../../implementations/python/provekit-lift-py-tests/src:../../implementations/python/provekit-lift-python-source/src",
    "python3",
    "-m",
    "provekit_lift_py_tests.lsp",
]
working_dir = "."

[capabilities]
authoring_surfaces = ["python-tests"]
ir_version = "v1.1.0"
emits_signed_mementos = false
