# Sugar project config for the Java end-to-end fixture. Registration is per
# project: lift and emit surfaces are declared here and resolved through
# .sugar/<kind>/<surface>/manifest.toml.

[authoring]
surface = "java"

[[plugins]]
name = "java-contracts"
kind = "lift"
surface = "java"
emit = "ir-document"

[[plugins]]
name = "java-junit5"
kind = "emit"
surface = "java-junit5"
emit = "junit5"

[[plugins]]
name = "java-testng"
kind = "emit"
surface = "java-testng"
emit = "testng"

[solvers]
default = "z3"

[solvers.dispatch]
linear_arithmetic = "z3"
default = "z3"

[solvers.z3]
binary = "z3"
flags = ["-smt2", "-in"]
