[[plugins]]
name = "java-test-assertions-lift"
kind = "lift"
surface = "java-test-assertions"
emit = "ir-document"

[solvers]
default = "z3"

[solvers.dispatch]
linear_arithmetic = "z3"
bitvectors = "z3"
default = "z3"

[solvers.z3]
binary = "z3"
flags = ["-smt2", "-in"]

[platform_profile]
language = "java"
library = "java-abs-universe-good"
version = "0.0.0"

# Assertion vocabulary is learned from the JUnit5 framework source.
# G2: the numeric universe (int32.eq-bv-expr) is walked from the JDK vendor source.
[java-test-assertions]
assertion_source_dirs = ["vendor/junit5"]
vendor_source_dirs = ["vendor/jdk21"]
