name = "python-pandas-testing-lift"
version = "0.1.0-draft"
protocol_version = "pep/1.7.0"
kind = "lift"
# The ONE assertion lifter -- the SAME lifter numpy-showcase uses. The "next
# package" is no longer a package: pandas is just another testing library the one
# lifter learns from imports, plus this workspace's
# .provekit/vocab-exceptions/pandas.testing.json (extra_modules + the obj kwarg).
# It imports pandas at lift time to derive the vocabulary, so the interpreter is
# the witness venv (which has pandas). PYTHONPATH at the one lifter.
command = [
    "/usr/bin/env",
    "PYTHONPATH=../../implementations/python/provekit-lift-py-tests/src",
    "/tmp/pandas-witness-venv/bin/python",
    "-m",
    "provekit_lift_py_tests.assertion_lsp",
]
working_dir = "."

[capabilities]
authoring_surfaces = ["python-pandas-testing"]
ir_version = "v1.1.0"
emits_signed_mementos = false
