# Declares the lift plugins this shim runs at mint time. The same
# `[[plugins]]` pattern the Rust shims use; the substrate's CLI is
# language-agnostic at the dispatch layer — only the per-plugin
# manifest names a different bin per language kit.
#
# Sugar lane: the TypeScript source lifter (typescript-source/bin.ts)
# walks @sugar.bind / @sugar.refuse decorators on the shim's own src.
# This is the sole lane: the shim's `.proof` is purely the sugar-binding +
# refusal members. There is no contract lane — no `typescript-contracts`
# lift manifest exists, and a declared-but-unmanifested `ts-contracts`
# plugin only breaks `mint` in a clean checkout.

[[plugins]]
name = "ts-sugar"
surface = "typescript-bind"
# The TS source lifter gates sugar/refusal emission on the layer
# string; only "library-bindings" produces library-sugar-binding-entry
# and refusal-memento. Declare it here so this plugin gets the right
# layer regardless of the global CLI flag.
layer = "library-bindings"
