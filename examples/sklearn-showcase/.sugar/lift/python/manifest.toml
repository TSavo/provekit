name = "python-lift"
version = "0.1.0-draft"
protocol_version = "pep/1.7.0"
kind = "lift"
# Bare pytest scalar consistency seat. The interpreter is the sklearn venv so
# imports used by source scanning and any helper resolution are present in CI.
command = [
    "/usr/bin/env",
    "PYTHONPATH=../../implementations/python/sugar-lift-py-tests/src",
    "/tmp/sklearn-witness-venv/bin/python",
    "-m",
    "sugar_lift_py_tests.lsp",
]
working_dir = "."

[capabilities]
authoring_surfaces = ["python"]
ir_version = "v1.1.0"
emits_signed_mementos = false
