[[plugins]]
name = "java-test-assertions-lift"
kind = "lift"
surface = "java-test-assertions"
emit = "ir-document"

[solvers]
default = "z3"

[solvers.dispatch]
linear_arithmetic = "z3"
strings = "z3"
default = "z3"

[solvers.z3]
binary = "z3"
flags = ["-smt2", "-in"]

[platform_profile]
language = "java"
library = "java-pattern-regex-good"
version = "0.0.0"

# Assertion vocabulary is learned from the framework's own source (Phase 2+).
# Door 3: the @Pattern regex universe is walked from the vendor's own source —
# the @Pattern annotation on UserHandle.accept (vendor/account), with the
# jakarta @Pattern annotation declaration (vendor/jakarta) parsed alongside.
# All paths are relative to the workspace root (this directory).
[java-test-assertions]
assertion_source_dirs = ["vendor/junit5"]
vendor_source_dirs = ["vendor/account", "vendor/jakarta"]
