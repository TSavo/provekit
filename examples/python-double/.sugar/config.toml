# Sugar project config for the Python end-to-end example. Registration is
# per project: lift, realize, and emit surfaces are declared here and resolved
# through .sugar/<kind>/<surface>/manifest.toml.

[[plugins]]
name = "python-lift"
kind = "lift"
surface = "python"

[[plugins]]
name = "python-realize"
kind = "realize"
surface = "python"

[[plugins]]
name = "python-pytest"
kind = "emit"
surface = "python-pytest"
emit = "pytest"

[solvers]
default = "z3"

[solvers.dispatch]
linear_arithmetic = "z3"
default = "z3"

[solvers.z3]
binary = "z3"
flags = ["-smt2", "-in"]
