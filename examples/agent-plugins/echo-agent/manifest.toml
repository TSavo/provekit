# Reference manifest for the echo agent plugin.
#
# Install: copy this directory to ~/.config/provekit/agents/echo-agent
# (or symlink it). The CLI will discover it via `provekit agent list`.
name = "echo-agent"
version = "0.1.0"
protocol_version = "provekit-agent/1"
binary = "echo_agent.py"
capabilities = ["lift", "must", "fix"]
