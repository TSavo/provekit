name = "pytest-witness-lift"
version = "0.1.0-draft"
protocol_version = "pep/1.7.0"
kind = "lift"
# The kit's lift entry (runs the test, emits the witnessed contract).
command = [
    "/usr/bin/env",
    "PYTHONPATH=../../implementations/python/sugar-lift-py-pytest-witness/src:../../implementations/python/sugar-lift-py-tests/src:../../implementations/python/sugar-lift-python-source/src",
    "python3",
    "-m",
    "sugar_pytest_witness.lift_lsp",
]
# The kit's DISCHARGE entry (re-runs the test to settle the witness). Declared
# here, alongside `command`, so witness discharge rides the SAME manifest
# dispatch lift uses. `witness_tool` keys the per-tool registry: `prove` exports
# this as SUGAR_WITNESS_DISCHARGE_PYTEST and the verifier routes the
# certificate's tool="pytest" to it.
discharge_command = [
    "/usr/bin/env",
    "PYTHONPATH=../../implementations/python/sugar-lift-py-pytest-witness/src:../../implementations/python/sugar-lift-py-tests/src:../../implementations/python/sugar-lift-python-source/src",
    "python3",
    "-m",
    "sugar_pytest_witness.discharge_cli",
]
witness_tool = "pytest"
# The kit's WITNESS-RESOLVE entry. Verification lives in the rust CLI; the kit
# oracle is UNTRUSTED and must be verified. Over `sugar.plugin.resolve_witness`
# it only RESOLVES a witness body (from the witness package, or by re-running)
# and hands back the bytes -- no verdict. The rust verifier blake3's those bytes
# itself and compares to the pinned witness_cid. Same server as `command`, a
# different RPC method, declared here so witness resolution ties to THIS kit per
# manifest (everything tied together per kit: lift, discharge, resolve).
resolve_witness_command = [
    "/usr/bin/env",
    "PYTHONPATH=../../implementations/python/sugar-lift-py-pytest-witness/src:../../implementations/python/sugar-lift-py-tests/src:../../implementations/python/sugar-lift-python-source/src",
    "python3",
    "-m",
    "sugar_pytest_witness.lift_lsp",
]
resolve_witness_method = "sugar.plugin.resolve_witness"
working_dir = "."

[capabilities]
authoring_surfaces = ["python-pytest-witness"]
