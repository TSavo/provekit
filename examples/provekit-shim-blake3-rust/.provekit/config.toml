# First L0 boundary shim. Declares its lift plugins:
#   - rust-sugar: walk_rpc finds #[provekit::sugar],
#                 #[provekit::boundary], #[provekit::refuse] on the
#                 shim's own src. Emits library-sugar-binding-entry,
#                 realization-memento (boundary), and refusal-memento.
#   - rust-contracts: provekit-lift dispatches the 9 Rust adapters
#                 against the shim's own test corpus.

[[plugins]]
name = "rust-sugar"
surface = "rust-bind"
layer = "library-bindings"

[[plugins]]
name = "rust-contracts"
surface = "rust-contracts"
emit = "ir-document"

[[plugins]]
name = "rust-implications"
surface = "rust-implications"

# #1358 / #1355: substrate platform_profile — the five-axis realization
# tuple this shim mints against. Materialize/migrate dispatch resolves
# consumer @boundary requests against this profile. Per-@sugar annotations
# may pin or float each axis independently; profile is the default when
# annotations omit them.
[platform_profile]
language = "rust"
family = "concept:family:hash"
library = "blake3"
version = "1"
