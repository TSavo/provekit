[[plugins]]
name = "java-test-assertions-lift"
kind = "lift"
surface = "java-test-assertions"
emit = "ir-document"

[solvers]
default = "z3"

[solvers.dispatch]
linear_arithmetic = "z3"
bitvectors = "z3"
default = "z3"

[solvers.z3]
binary = "z3"
flags = ["-smt2", "-in"]

[platform_profile]
language = "java"
library = "java-abs-bound-bad"
version = "0.0.0"

# G2b × G2: comparison bound meets walked numeric universe.
# Assertion vocabulary from JUnit5; universe walked from JDK21 Math.abs body.
[java-test-assertions]
assertion_source_dirs = ["vendor/junit5"]
vendor_source_dirs = ["vendor/jdk21"]
