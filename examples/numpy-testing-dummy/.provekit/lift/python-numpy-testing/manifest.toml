name = "python-numpy-testing-lift"
version = "0.1.0-draft"
protocol_version = "pep/1.7.0"
kind = "lift"
# The ONE assertion lifter. It learns numpy's vocabulary from each test file's
# imports plus this workspace's .provekit/vocab-exceptions/numpy.testing.json.
# PYTHONPATH at the one lifter (provekit-lift-py-tests) + the python-source helper.
command = [
    "/usr/bin/env",
    "PYTHONPATH=../../implementations/python/provekit-lift-py-tests/src:../../implementations/python/provekit-lift-python-source/src",
    "python3",
    "-m",
    "provekit_lift_py_tests.assertion_lsp",
]
working_dir = "."

[capabilities]
authoring_surfaces = ["python-numpy-testing"]
ir_version = "v1.1.0"
emits_signed_mementos = false
