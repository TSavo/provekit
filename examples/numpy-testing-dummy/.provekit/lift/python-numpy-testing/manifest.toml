name = "python-numpy-testing-lift"
version = "0.1.0-draft"
protocol_version = "pep/1.7.0"
kind = "lift"
# Relative PYTHONPATH at the seat src + the pytest seat it reuses for term
# machinery + the python-source helper. Resolved from working_dir (project root).
command = [
    "/usr/bin/env",
    "PYTHONPATH=../../implementations/python/provekit-lift-py-numpy-testing/src:../../implementations/python/provekit-lift-py-tests/src:../../implementations/python/provekit-lift-python-source/src",
    "python3",
    "-m",
    "provekit_lift_py_numpy_testing.lsp",
]
working_dir = "."

[capabilities]
authoring_surfaces = ["python-numpy-testing"]
ir_version = "v1.1.0"
emits_signed_mementos = false
