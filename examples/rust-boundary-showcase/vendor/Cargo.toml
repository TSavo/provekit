# The "vendor": a path-dependency crate whose REAL source lives on disk. It is
# PLAIN rust — no provekit dependency, no `#[provekit::sugar]` attribute. Its
# ordinary `pub fn reverse_chars` is the producer of the lean SourceMemento: in
# the `library-bindings` layer the lift DERIVES the binding from the crate name
# + fn name (no tag required). This is the rust analog of "installed numpy" in
# numpy-showcase: untouched source the oracle resolves.
[package]
name = "rust-boundary-vendor"
version = "0.1.0"
edition = "2021"

[dependencies]

[lib]
path = "src/lib.rs"
