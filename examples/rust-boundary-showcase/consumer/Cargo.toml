# The consumer: a crate with a `#[sugar::boundary(library, call)]` stub whose
# body is `unimplemented!()`. `materialize` fills it from the vendor's
# REAL `reverse_chars` source (CID-verified against the frozen vendor .proof in
# .sugar/imports/).
[package]
name = "rust-boundary-consumer"
version = "0.1.0"
edition = "2021"

[dependencies]
sugar = { package = "sugar-lifter", path = "../../../implementations/rust/sugar-lifter" }

[lib]
path = "src/lib.rs"
