# The consumer: a crate with a `#[provekit::boundary(library, call)]` stub whose
# body is `unimplemented!()`. `materialize-boundary` fills it from the vendor's
# REAL `reverse_chars` source (CID-verified against the frozen vendor .proof in
# .provekit/imports/).
[package]
name = "rust-boundary-consumer"
version = "0.1.0"
edition = "2021"

[dependencies]
provekit = { package = "provekit-sugar", path = "../../../implementations/rust/provekit-sugar" }

[lib]
path = "src/lib.rs"
