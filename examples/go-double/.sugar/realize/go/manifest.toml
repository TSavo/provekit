# Go realize surface for `sugar materialize`: the SHIM that supplies the
# native Go sugar for a contract's concept (sugar-realize-go-core).
#
# Build it first from the implementations/go/sugar-realize-go-core module:
#
#     cd implementations/go/sugar-realize-go-core && \
#       go build -o /tmp/sugar-realize-go ./cmd/sugar-realize-go
#
# then edit `command[0]` to the built path or put it on PATH. The gating test
# (sugar-cli/tests/go_realize_materialize.rs) builds the binary and installs
# this manifest into a tempdir, so the in-repo example stays
# build-location-agnostic.
name = "go-realize"
library_tag = "go"
materialize_source = true
command = ["sugar-realize-go", "--rpc"]
working_dir = "."
