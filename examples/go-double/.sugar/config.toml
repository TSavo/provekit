# Sugar project config for the Go end-to-end example. Registration is
# per project: lift and emit surfaces are all declared here and resolved
# through .sugar/<kind>/<surface>/manifest.toml.

[[plugins]]
name = "go-lift"
kind = "lift"
surface = "go"

[[plugins]]
name = "go-realize"
kind = "realize"
surface = "go"

[[plugins]]
name = "go-testing"
kind = "emit"
surface = "go-testing"
emit = "testing"

[[plugins]]
name = "go-testify"
kind = "emit"
surface = "go-testify"
emit = "testify"

[solvers]
default = "z3"

[solvers.dispatch]
linear_arithmetic = "z3"
default = "z3"

[solvers.z3]
binary = "z3"
flags = ["-smt2", "-in"]
