# Go lift surface for `sugar mint` / `sugar verify`.
#
# `command` is the verify-facing Go lift binary (sugar-lift-go-verify),
# launched in RPC mode. Build it first from the implementations/go module:
#
#     cd implementations/go && go build -o /tmp/sugar-lift-go-verify ./cmd/sugar-lift-go-verify
#
# then run the example with the binary on PATH or by editing `command[0]`
# below to the built path. The integration test
# (sugar-cli/tests/cmd_verify_go_production_bridge.rs) builds the binary and
# rewrites this manifest's command to the built path in a tempdir copy, so the
# in-repo example stays build-location-agnostic.
name = "go"
command = ["sugar-lift-go-verify", "--rpc"]
working_dir = "."
