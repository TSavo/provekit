name = "python-tests-lift"
version = "0.1.0-draft"
protocol_version = "pep/1.7.0"
kind = "lift"
# Dispatch the PYTEST contract lifter. PYTHONPATH points at the lifter source
# tree (no install/venv needed). working_dir is this project root; the relative
# paths resolve to the repo's implementations/ tree.
command = [
    "/usr/bin/env",
    "PYTHONPATH=../../implementations/python/sugar-lift-py-tests/src:../../implementations/python/sugar-lift-python-source/src",
    "python3",
    "-m",
    "sugar_lift_py_tests.lsp",
]
working_dir = "."

[capabilities]
authoring_surfaces = ["python-tests"]
ir_version = "v1.1.0"
emits_signed_mementos = false
