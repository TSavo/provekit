name = "python-tests-lift"
version = "0.1.0-draft"
protocol_version = "pep/1.7.0"
kind = "lift"
# The lift shim exports PYTHONPATH = lifter sources + the showcase venv's
# site-packages (so the walker can resolve itsdangerous' installed source),
# then execs the pytest lifter.
command = ["./lift-shim.sh"]
working_dir = "."

[capabilities]
authoring_surfaces = ["python-tests"]
ir_version = "v1.1.0"
emits_signed_mementos = false
