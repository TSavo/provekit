# python-urlsafe-seam twin: pytest-lift surface + z3 seat. The universe row
# (str.chars-not-in-set, walked from Lib/base64.py's maketrans) conjoins
# with the sworn equality under the same #euf# base at verify.

[[plugins]]
name = "python-tests-lift"
kind = "lift"
surface = "python-tests"

[solvers]
default = "z3"

[solvers.dispatch]
linear_arithmetic = "z3"
default = "z3"

[solvers.z3]
binary = "z3"
flags = ["-smt2", "-in"]
