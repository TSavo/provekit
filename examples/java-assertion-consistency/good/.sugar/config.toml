[[plugins]]
name = "java-test-assertions-lift"
kind = "lift"
surface = "java-test-assertions"
emit = "ir-document"

[solvers]
default = "z3"

[solvers.dispatch]
linear_arithmetic = "z3"
default = "z3"

[solvers.z3]
binary = "z3"
flags = ["-smt2", "-in"]

[platform_profile]
language = "java"
library = "java-assertion-consistency-good"
version = "0.0.0"

# Phase 2: assertion vocabulary is learned from the framework's own source.
# assertion_source_dirs is relative to the workspace root (this directory).
[java-test-assertions]
assertion_source_dirs = ["vendor/junit5"]
