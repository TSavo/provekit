# SPDX-License-Identifier: Apache-2.0
#
# Rust implications surface. Walks production fn bodies; for every Expr::Call /
# Expr::MethodCall emits a kind:bridge memento pinning the call site to a
# contract resolved by ctor-name index. A method call `opt.unwrap()` lifts to
# ctor `method:unwrap`, so its bridge sourceSymbol is `method:unwrap` (the
# method: seam): it must MATCH the ctor name the verifier looks up. The
# `.unwrap()` sites bridge into the rust-std shim's option_unwrap partial.
# `method` routes mint to the implication lift path; `phase = consumer`. Same
# two-`..` path rule as the other surfaces.
name = "rust-implications-lift"
command = ["../../implementations/rust/target/debug/sugar-walk-rpc", "--rpc"]
working_dir = "."
method = "sugar.plugin.lift_implications"
phase = "consumer"
