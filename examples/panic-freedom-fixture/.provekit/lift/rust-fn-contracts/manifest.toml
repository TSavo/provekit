#
# Rust production function-contract surface. For every production `fn` (here
# guarded_unwrap / unguarded_unwrap) walk derives a body-bearing
# FunctionContractMemento (formals + pre + body-derived post). The guarded
# function's post carries a `cf_ite(is_some(opt), cf_guarded(is_some(opt),
# method:unwrap(opt)), 0)` term; the implication surface bridges the
# `method:unwrap` call site inside it. Same two-`..` path rule as the other
# surfaces. `emit = "ir-document"` (on the config entry) routes here.
name = "rust-fn-contracts-lift"
command = ["../../implementations/rust/target/debug/provekit-walk-rpc", "--rpc"]
working_dir = "."
