[[plugins]]
name = "java-test-assertions-lift"
kind = "lift"
surface = "java-test-assertions"
emit = "ir-document"

[solvers]
default = "z3"

[solvers.dispatch]
linear_arithmetic = "z3"
default = "z3"

[solvers.z3]
binary = "z3"
flags = ["-smt2", "-in"]

[platform_profile]
language = "java"
library = "java-mt-reference-bad"
version = "0.0.0"

# assertion_source_dirs: JUnit5 framework source for vocabulary derivation.
# vendor_source_dirs: MersenneTwister.java for type resolution.
[java-test-assertions]
assertion_source_dirs = ["vendor/junit5"]
vendor_source_dirs = ["vendor/commons-rng"]
