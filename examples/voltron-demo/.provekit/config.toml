# voltron-demo lift configuration.
#
# Two lift surfaces:
#   - rust-sugar: pulls #[provekit::sugar] / #[provekit::boundary] /
#                 #[provekit::refuse] attributes from src. After
#                 materialize, the demo's boundary functions ARE the
#                 vendor sugar (spliced from the shims' .proofs); this
#                 surface lifts them back into the head's binding set.
#   - rust-contracts: pulls #[contract], unit tests (via the
#                 rust-tests adapter), and panic/early-return shapes
#                 in user-side functions as contract evidence.
#                 Tests are the canonical user-side contract surface.

[[plugins]]
name = "rust-sugar"
surface = "rust-bind"
layer = "library-bindings"

[[plugins]]
name = "rust-contracts"
surface = "rust-contracts"
emit = "ir-document"

[[plugins]]
name = "rust-walk-contracts"
surface = "rust-walk-contracts"
emit = "ir-document"

[[plugins]]
name = "rust-implications"
surface = "rust-implications"

[[plugins]]
name = "rust-realize"
kind = "realize"
surface = "rust"

[platform_profile]
language = "rust"
family = "concept:family:multi-vendor-demo"
library = "voltron-demo"
version = "0.0.0"
