name = "pytest-witness-lift"
version = "0.1.0-draft"
protocol_version = "pep/1.7.0"
kind = "lift"
# The kit's lift entry (RUNS the test, emits the witnessed contract). The
# witness lifter executes real pandas, so its interpreter is the pandas venv.
command = [
    "/usr/bin/env",
    "PYTHONPATH=../../implementations/python/sugar-lift-py-pytest-witness/src:../../implementations/python/sugar-lift-py-tests/src:../../implementations/python/sugar-lift-python-source/src",
    "/tmp/pandas-witness-venv/bin/python",
    "-m",
    "sugar_pytest_witness.lift_lsp",
]
# The kit's DISCHARGE entry (re-runs the test to settle the witness).
discharge_command = [
    "/usr/bin/env",
    "PYTHONPATH=../../implementations/python/sugar-lift-py-pytest-witness/src:../../implementations/python/sugar-lift-py-tests/src:../../implementations/python/sugar-lift-python-source/src",
    "/tmp/pandas-witness-venv/bin/python",
    "-m",
    "sugar_pytest_witness.discharge_cli",
]
witness_tool = "pytest"
# The kit's WITNESS-RESOLVE entry. The rust verifier blake3's the resolved bytes
# itself and compares to the pinned witness_cid -- the kit oracle is UNTRUSTED.
resolve_witness_command = [
    "/usr/bin/env",
    "PYTHONPATH=../../implementations/python/sugar-lift-py-pytest-witness/src:../../implementations/python/sugar-lift-py-tests/src:../../implementations/python/sugar-lift-python-source/src",
    "/tmp/pandas-witness-venv/bin/python",
    "-m",
    "sugar_pytest_witness.lift_lsp",
]
resolve_witness_method = "sugar.plugin.resolve_witness"
working_dir = "."

[capabilities]
authoring_surfaces = ["python-pytest-witness"]
