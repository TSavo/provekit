# PEP 1.7.0 `kind = "lift"` plugin manifest for the C bind-IR surface.
# Walks .c files via libclang and returns `ir-document` with
# `bind-lift-entry` records per `2026-05-13-bind-ir-lift-result.md`.
#
# The kit emits concepts via term_shape plus concept_annotation, not c:* or
# c11:* surface ops. ProofIR is concept-language; this kit bridges C syntax to
# concept-shaped records the bind dispatcher consumes.
name = "c-bind-lift"
version = "0.1.0"
protocol_version = "pep/1.7.0"
kind = "lift"
command = ["implementations/c/provekit-walk-c/provekit-bind-lift-c"]
working_dir = "."

[capabilities]
authoring_surfaces = ["c-bind"]
ir_version = "bind-ir/1.0.0"
emits_signed_mementos = false
