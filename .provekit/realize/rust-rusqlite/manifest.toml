# PEP 1.7.0 realize plugin manifest for Rust + rusqlite body emission.
# Reuses the workspace's existing provekit-realize-rust binary; concept
# routing for rusqlite comes from the shim's published .proof envelope
# and the rust-canonical-bodies body-templates JSON the binary reads.
name = "rust-realize-rusqlite"
library_tag = "rusqlite"
family = "concept:family:sql"
library_version = "0.39"
# #1364 / #1355 / #1468: per-kit concept coverage. Sourced from
# menagerie/rust-language-signature/specs/body-templates/rust-canonical-bodies-rusqlite.json.
# After the cardinality split (#1468): conn/stmt query_row -> concept:sql-query-row;
# stmt query/query_map/query_and_then (lazy cursors) -> concept:sql-query-iterate.
# stmt.exists stays on flat concept:sql-query (cardinality projected to a boolean;
# neither at-most-one nor a row set). No -all binding: rusqlite has no
# connection/statement method that returns a materialized Vec<Row> directly.
provides_concepts = ["concept:contract-observation", "concept:insert-and-get-id", "concept:sql-batch-execute", "concept:sql-busy-timeout", "concept:sql-changes-count", "concept:sql-connection-close", "concept:sql-connection-open", "concept:sql-execute", "concept:sql-prepare", "concept:sql-prepare-cached", "concept:sql-query", "concept:sql-query-iterate", "concept:sql-query-row", "concept:sql-row-get-column", "concept:sql-savepoint", "concept:sql-transaction-begin", "concept:sql-transaction-commit", "concept:sql-transaction-rollback"]
command = ["implementations/rust/target/debug/provekit-realize-rust", "--rpc"]
working_dir = "."
