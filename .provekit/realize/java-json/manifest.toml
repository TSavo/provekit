# PEP 1.7.0 realize plugin manifest for Java + Jackson JSON body emission.
# Sister manifest to .provekit/realize/rust-shim-serde-json (rust kit's
# serde_json realization) under concept:family:json. Routes the 2 json
# concepts (parse + serialize) from provekit-shim-json-java's .proof envelope.
name = "java-realize-json"
library_tag = "jackson"
family = "concept:family:json"
library_version = "2.17"
provides_concepts = ["concept:json-parse", "concept:json-serialize"]
command = ["java", "-jar", "implementations/java/provekit-realize-java-core/target/provekit-realize-java.jar", "--rpc"]
working_dir = "."
