# PEP 1.7.0 `kind = "realize"` plugin manifest for Python aiosqlite body emission.
# cmd_bind dispatches canonical rewrite emission here when target-language=python and library_tag=aiosqlite.
name = "python-realize-aiosqlite"
library_tag = "aiosqlite"
family = "concept:family:sql"
library_version = "0.20"
# #1364 / #1355: per-kit concept coverage. #1468: the flat concept:sql-query is
# split by result cardinality into concept:sql-query-row / -all / -iterate (all
# three are realized by this kit's async query bindings), and the kit now carries
# the full async mirror of the sqlite3 shim's concept coverage.
provides_concepts = ["concept:insert-and-get-id", "concept:sql-batch-execute", "concept:sql-changes-count", "concept:sql-connection-close", "concept:sql-connection-open", "concept:sql-execute", "concept:sql-fetch-batch", "concept:sql-prepare", "concept:sql-query-all", "concept:sql-query-iterate", "concept:sql-query-row", "concept:sql-row-get-column", "concept:sql-row-mapping", "concept:sql-transaction-begin", "concept:sql-transaction-commit", "concept:sql-transaction-rollback"]
command = ["implementations/python/target/release/provekit-realize-python-aiosqlite", "--rpc"]
working_dir = "."
