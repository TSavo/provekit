# PEP 1.7.0 realize plugin manifest for Rust + provekit-shim-stdio-rust.
name = "rust-realize-shim-stdio"
library_tag = "provekit-shim-stdio-rust"
family = "concept:family:stdio-stream"
library_version = "rust-1"
# #1360 / #1355: per-target scope-bringings the consumer crate needs in
# its prelude when bodies from this realize plugin are spliced. The
# materialized bodies call `io::stdin()` / `io::stdout()` / `io::stderr()`
# and use the `BufRead` + `Write` traits as method receivers; the consumer
# crate needs all three in scope. cmd_materialize collects these across
# materialized sites and hoists them into the consumer file's prelude
# (deduplicated against existing `use` items).
scope_bringings = ["use std::io::{self, BufRead, Write};"]
# #1364: explicit concept coverage for this kit.
provides_concepts = [
    "concept:stdio-read-line",
    "concept:stdio-write-line",
    "concept:stderr-write-line",
]
command = ["implementations/rust/target/debug/provekit-realize-rust", "--rpc"]
working_dir = "."
