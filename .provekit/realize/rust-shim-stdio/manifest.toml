# PEP 1.7.0 realize plugin manifest for Rust + provekit-shim-stdio-rust.
# Cross-platform @boundary sites tagged `library = "provekit-shim-stdio-rust"`
# dispatch here. The realize binary looks up the concept (e.g.
# `concept:stdio-read-line`) in the shim's signed .proof envelope at
# examples/provekit-shim-stdio-rust/.provekit/ and emits the canonical
# Rust body, then materialize splices it into the @boundary stub.
name = "rust-realize-shim-stdio"
library_tag = "provekit-shim-stdio-rust"
command = ["implementations/rust/target/debug/provekit-realize-rust", "--rpc"]
working_dir = "."
