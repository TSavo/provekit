# PEP 1.7.0 `kind = "realize"` plugin manifest for Python sqlite3 body emission.
# cmd_bind dispatches canonical rewrite emission here when target-language=python and library_tag=sqlite3.
name = "python-realize-sqlite3"
library_tag = "sqlite3"
family = "concept:family:sql"
library_version = "python-3"
# #1364 / #1355: per-kit concept coverage. #1468: the flat concept:sql-query is
# split by result cardinality into concept:sql-query-row / -all / -iterate (all
# three are realized by this kit's query bindings), so 22 -> 24 concepts.
provides_concepts = ["concept:contract-observation", "concept:insert-and-get-id", "concept:sql-batch-execute", "concept:sql-busy-timeout", "concept:sql-changes-count", "concept:sql-connection-close", "concept:sql-connection-open", "concept:sql-execute", "concept:sql-fetch-batch", "concept:sql-prepare", "concept:sql-prepare-cached", "concept:sql-progress-handler", "concept:sql-query-all", "concept:sql-query-iterate", "concept:sql-query-row", "concept:sql-row-get-column", "concept:sql-row-mapping", "concept:sql-savepoint", "concept:sql-schema-dump", "concept:sql-transaction-begin", "concept:sql-transaction-commit", "concept:sql-transaction-rollback", "concept:sql-udf-aggregate", "concept:sql-udf-register"]
command = ["implementations/python/target/release/provekit-realize-python-sqlite3", "--rpc"]
working_dir = "."
