# PEP 1.7.0 `kind = "realize"` plugin manifest for Python sqlite3 body emission.
# cmd_bind dispatches canonical rewrite emission here when target-language=python and library_tag=sqlite3.
name = "python-realize-sqlite3"
library_tag = "sqlite3"
family = "concept:family:sql"
library_version = "python-3"
# #1364 / #1355: per-kit concept coverage (22 concepts).
provides_concepts = ["concept:contract-observation", "concept:insert-and-get-id", "concept:sql-batch-execute", "concept:sql-busy-timeout", "concept:sql-changes-count", "concept:sql-connection-close", "concept:sql-connection-open", "concept:sql-execute", "concept:sql-fetch-batch", "concept:sql-prepare", "concept:sql-prepare-cached", "concept:sql-progress-handler", "concept:sql-query", "concept:sql-row-get-column", "concept:sql-row-mapping", "concept:sql-savepoint", "concept:sql-schema-dump", "concept:sql-transaction-begin", "concept:sql-transaction-commit", "concept:sql-transaction-rollback", "concept:sql-udf-aggregate", "concept:sql-udf-register"]
# `.proof`-load-via-RPC: the AUTHORITY for this kit's emission bodies is the
# sqlite3 shim's @sugar.bind source, lifted into its signed .proof. The pointer
# names the shim project dir; cmd_materialize globs its *.proof, extracts the
# library-sugar-binding-entry records for tag `sqlite3`, and feeds them to the
# realize plugin over RPC (RealizeRequest.body_templates). The on-disk
# python-canonical-bodies-sqlite3.json is no longer needed (deleted). Mirrors
# the java-{json,gson} manifests (PR #1458).
sugar_proof = "examples/provekit-shim-python-sqlite3"
command = ["implementations/python/target/release/provekit-realize-python-sqlite3", "--rpc"]
working_dir = "."
