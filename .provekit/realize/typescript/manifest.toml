# menagerie/typescript-language-signature/specs/body-templates/typescript-canonical-bodies.json.
provides_concepts = ["concept:contract-observation", "concept:http-request", "concept:http-response"]
command = ["implementations/typescript/target/release/provekit-realize-typescript", "--rpc"]
working_dir = "."
