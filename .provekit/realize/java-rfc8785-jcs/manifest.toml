# PEP 1.7.0 realize plugin manifest for Java + provekit-rfc8785-jcs-java body emission.
# Sister manifest to .provekit/realize/rust-shim-rfc8785-jcs under
# concept:family:json-canonicalization. Three concepts: encode + encode-value + encode-string.
name = "java-realize-rfc8785-jcs"
library_tag = "provekit-rfc8785-jcs-java"
family = "concept:family:json-canonicalization"
library_version = "0.1"
provides_concepts = ["concept:rfc8785-jcs-encode", "concept:rfc8785-jcs-encode-value", "concept:rfc8785-jcs-encode-string"]
# `.proof`-load-via-RPC: AUTHORITY is the rfc8785-jcs shim's @ProveKitSugar
# source (RFC8785JcsShim.java, library = "provekit-rfc8785-jcs-java"), lifted
# into its signed .proof. cmd_materialize globs this dir's *.proof, extracts the
# library-sugar-binding-entry records for tag `provekit-rfc8785-jcs-java`, and
# feeds them over RPC (RealizeRequest.body_templates). The on-disk
# java-canonical-bodies-provekit-rfc8785-jcs-java.json is deleted (migrated off
# JSON per the jackson/gson template, PR #1458).
sugar_proof = "examples/provekit-shim-rfc8785-jcs-java"
command = ["java", "-jar", "implementations/java/provekit-realize-java-core/target/provekit-realize-java.jar", "--rpc"]
working_dir = "."
