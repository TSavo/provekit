# PEP 1.7.0 `kind = "realize"` plugin manifest for TypeScript pg body emission.
# cmd_bind dispatches canonical rewrite emission here when target-language=typescript and library_tag=pg.
name = "typescript-realize-pg"
library_tag = "pg"
family = "concept:family:sql"
library_version = "8.16.3"
# #1364 / #1355 / #1468: per-kit concept coverage. After the cardinality split,
# the connection-level query concept is the global pair concept:sql-query-row / -all.
# node-pg has no lazy cursor (that is the separate pg-cursor package), so
# concept:sql-query-iterate is refused, not provided.
provides_concepts = ["concept:insert-and-get-id", "concept:sql-connection-close", "concept:sql-connection-open", "concept:sql-execute", "concept:sql-prepare", "concept:sql-query-all", "concept:sql-query-row", "concept:sql-transaction-begin", "concept:sql-transaction-commit", "concept:sql-transaction-rollback"]
command = ["implementations/typescript/target/release/provekit-realize-typescript-pg", "--rpc"]
working_dir = "."
