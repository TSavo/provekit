# PEP 1.7.0 `kind = "realize"` plugin manifest for TypeScript better-sqlite3 body emission.
# cmd_bind dispatches canonical rewrite emission here when target-language=typescript and library_tag=better-sqlite3.
name = "typescript-realize-better-sqlite3"
library_tag = "better-sqlite3"
family = "concept:family:sql"
library_version = "12.9.0"
# #1364 / #1355 / #1468: per-kit concept coverage. After the cardinality split,
# the connection-level query concept is the global pair concept:sql-query-row / -all.
provides_concepts = ["concept:sql-execute", "concept:sql-query-row", "concept:sql-query-all"]
command = ["implementations/typescript/target/release/provekit-realize-typescript-better-sqlite3", "--rpc"]
working_dir = "."
