# PEP 1.7.0 realize plugin manifest for Java + java.io stdio body emission.
# Sister manifest to .provekit/realize/rust-shim-stdio (rust kit's std::io
# realization) under concept:family:stdio-stream. Re-uses the workspace's
# provekit-realize-java-core binary; concept routing for the 3 stdio
# concepts comes from the shim's signed .proof envelope.
name = "java-realize-stdio"
library_tag = "java-io"
family = "concept:family:stdio-stream"
library_version = "jdk-1.0+"
# #1364 / #1355: explicit per-kit concept-coverage declaration. Mirrors
# the rust-shim-stdio manifest's 3 concepts.
provides_concepts = ["concept:stdio-read-line", "concept:stdio-write-line", "concept:stderr-write-line"]
# `.proof`-load-via-RPC: AUTHORITY is the java.io shim's @ProveKitSugar source
# (StdioJavaShim.java, library = "java-io"), lifted into its signed .proof.
# cmd_materialize globs this dir's *.proof, extracts the
# library-sugar-binding-entry records for tag `java-io`, and feeds them over
# RPC (RealizeRequest.body_templates). The on-disk
# java-canonical-bodies-java-io.json is deleted (migrated off JSON per the
# jackson/gson template, PR #1458).
sugar_proof = "examples/provekit-shim-stdio-java"
command = ["java", "-jar", "implementations/java/provekit-realize-java-core/target/provekit-realize-java.jar", "--rpc"]
working_dir = "."
