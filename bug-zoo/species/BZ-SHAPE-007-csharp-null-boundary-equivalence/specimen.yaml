id: BZ-SHAPE-007
name: C# Null Boundary Equivalence
kingdom: shape
surface: csharp-data-annotations-provekit-annotations-and-linq
status: lab
paths:
  labLibrary: lab/library
  labHarness: lab/harness
  labKitRpc: lab/kit-rpc
commands:
  hostCheck:
    cwd: lab/harness
    argv: ["./run.sh"]
predicates:
  boundary: maybe_null(name)
  sink: non_null(name)
  missingEdge: maybe_null(name) => non_null(name)
exposures:
  - id: data-annotations
    surface: csharp-data-annotations
    harness: exposed/data-annotations/harness
    kitRpc: exposed/data-annotations/kit-rpc
    liftRpc:
      cwd: exposed/data-annotations/kit-rpc
      argv: ["./run-csharp-lifter.sh"]
    proofIrFile: exposed/data-annotations/expected.proofir.json
    diagnosticFile: exposed/data-annotations/expected-diagnostic.txt
    lossiness:
      erased:
        - C# method body string concatenation
        - concrete DataAnnotations runtime implementation
      preserved:
        - precondition neq(name, null)
  - id: provekit-annotations
    surface: csharp-provekit-annotations
    harness: exposed/provekit-annotations/harness
    kitRpc: exposed/provekit-annotations/kit-rpc
    liftRpc:
      cwd: exposed/provekit-annotations/kit-rpc
      argv: ["./run-csharp-lifter.sh"]
    proofIrFile: exposed/provekit-annotations/expected.proofir.json
    diagnosticFile: exposed/provekit-annotations/expected-diagnostic.txt
    lossiness:
      erased:
        - C# method body string concatenation
        - concrete provekit annotation scanner declaration shape
      preserved:
        - precondition neq(name, null)
  - id: linq-where
    surface: csharp-linq
    harness: exposed/linq-where/harness
    kitRpc: exposed/linq-where/kit-rpc
    liftRpc:
      cwd: exposed/linq-where/kit-rpc
      argv: ["./run-csharp-lifter.sh"]
    proofIrFile: exposed/linq-where/expected.proofir.json
    diagnosticFile: exposed/linq-where/expected-diagnostic.txt
    lossiness:
      erased:
        - C# method body string concatenation
        - concrete LINQ membership quantifier shape
      preserved:
        - precondition neq(name, null)
equivalence:
  required:
    - [data-annotations, provekit-annotations]
    - [data-annotations, linq-where]
expectations:
  hostCompiler: pass
  ordinaryTests: pass
  provekitVerify: fail
exposure:
  satWitnessFile: exposed/sat-witness.json
dropper:
  available: true
  surface: csharp-native
  source: lab/library/src/UserDirectory.cs
  targetSymbol: lookup
  proofVar: name
  realizerRpc:
    cwd: dropped/csharp-native/kit-rpc
    argv: ["./run-csharp-realizer.sh"]
  outputSource: dropped/csharp-native/library/src/UserDirectory.cs
  proofPlanFile: dropped/csharp-native/proof-plan.json
  languageDropperFile: dropped/csharp-native/language-dropper.json
  closureProofIrFile: dropped/csharp-native/closure.proofir.json
  fixReceiptFile: dropped/csharp-native/fix-receipt.json
wildSightings: []
