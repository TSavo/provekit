id: BZ-SHAPE-006
name: TypeScript Null Boundary Equivalence
kingdom: shape
surface: typescript-zod-and-class-validator
status: lab
paths:
  labLibrary: lab/library
  labHarness: lab/harness
  labKitRpc: lab/kit-rpc
commands:
  hostCheck:
    cwd: lab/harness
    argv: ["./run.sh"]
predicates:
  boundary: maybe_null(name)
  sink: non_null(name)
  missingEdge: maybe_null(name) => non_null(name)
exposures:
  - id: zod
    surface: typescript-zod
    harness: exposed/zod/harness
    kitRpc: exposed/zod/kit-rpc
    liftRpc:
      cwd: exposed/zod/kit-rpc
      argv: ["./run-ts-lifter.sh"]
    proofIrFile: exposed/zod/expected.proofir.json
    diagnosticFile: exposed/zod/expected-diagnostic.txt
    lossiness:
      erased:
        - TypeScript function body string concatenation
        - concrete zod parser runtime implementation
      preserved:
        - precondition neq(name, null)
  - id: class-validator
    surface: typescript-class-validator
    harness: exposed/class-validator/harness
    kitRpc: exposed/class-validator/kit-rpc
    liftRpc:
      cwd: exposed/class-validator/kit-rpc
      argv: ["./run-ts-lifter.sh"]
    proofIrFile: exposed/class-validator/expected.proofir.json
    diagnosticFile: exposed/class-validator/expected-diagnostic.txt
    lossiness:
      erased:
        - TypeScript function body string concatenation
        - concrete class-validator decorator package name
      preserved:
        - precondition neq(name, null)
equivalence:
  required:
    - [zod, class-validator]
expectations:
  hostCompiler: pass
  ordinaryTests: pass
  provekitVerify: fail
exposure:
  satWitnessFile: exposed/sat-witness.json
dropper:
  available: true
  surface: typescript-native
  source: lab/library/src/UserDirectory.ts
  targetSymbol: lookup
  proofVar: name
  realizerRpc:
    cwd: dropped/typescript-native/kit-rpc
    argv: ["./run-ts-realizer.sh"]
  outputSource: dropped/typescript-native/library/src/UserDirectory.ts
  proofPlanFile: dropped/typescript-native/proof-plan.json
  languageDropperFile: dropped/typescript-native/language-dropper.json
  closureProofIrFile: dropped/typescript-native/closure.proofir.json
  fixReceiptFile: dropped/typescript-native/fix-receipt.json
wildSightings: []
