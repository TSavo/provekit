# provekit.config.yaml: per-project provider configuration.
#
# `provekit diff` (and any other workflow that needs a solver) reads
# this file at the project root and resolves the framework's Solver
# from the entries below.
#
# One entry → that solver runs. Multiple entries → all run in
# parallel, the verdict is the agreed value. There's no special case
# for "two solvers" or "both"; the array IS the configuration.
#
# Adding a new solver = adding a new entry. The `flags` template
# supports {{TIMEOUT_S}} and {{TIMEOUT_MS}} placeholders. A solver
# that speaks SMT-LIB 2.6 on stdin and emits sat/unsat/unknown on the
# last line of stdout works with no TypeScript changes.

providers:
  solver:
    - type: z3
      binary: z3
      flags: ["-in", "-T:{{TIMEOUT_S}}"]
      timeoutMs: 5000
    - type: cvc5
      binary: cvc5
      flags: ["--lang=smt2", "--tlimit-per={{TIMEOUT_MS}}"]
      timeoutMs: 5000
    - type: coq
      binary: coqc
      flags: ["{{INPUT_FILE}}"]
      timeoutMs: 30000
      dialect: coq
