# ProvekIt — cross-language conformance gate
#
# Runs the same gate as `make ci` on every push and PR. Source of truth
# for "is the protocol byte-deterministic across all 5 peer languages on
# Linux x86_64 today" — answer is committed to the repo, not asserted.
#
# Languages exercised:
#   Rust 1.x stable, Go 1.22, .NET 10 (preview), Node 22 + pnpm 10,
#   Python 3.12, Java 21 (Temurin) + Maven, clang++ via apt + vendored portable BLAKE3.
#
# The Makefile is the contract. CI installs toolchains then calls `make`
# targets so local dev and CI run the same code path. If you can run
# `make ci` locally, this workflow runs the same thing.

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    name: Cross-language conformance gate
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Toolchain setup (parallelizable from GH's perspective; ordered
      # here for log readability).
      # ---------------------------------------------------------------

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target dirs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            implementations/rust/target
            tools/recompute-spec-cids/target
            tools/foundation-keygen/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: |
            implementations/go/provekit-ir-symbolic/go.sum
            implementations/go/provekit-self-contracts/go.sum
            implementations/go/provekit-lift-go-tests/go.sum

      - name: Set up .NET 10 (preview)
        uses: actions/setup-dotnet@v4
        with:
          # net10.0 is pre-stable; setup-dotnet@v4 needs an explicit quality
          # tag plus the major version. The 'preview' channel resolves to
          # the latest 10.0.x SDK from the official Microsoft feed.
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.33.0'

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          # NOT Node 25; @ipld/dag-cbor ESM-only + tsx CJS bridge fights
          # on Node 25 (see the broken bin/provekit*.cjs launchers). The
          # vitest path used by mint-ts is fine on 22.
          node-version: '22'
          cache: 'pnpm'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Java 21 + Maven
        # build-java (added by java-agent E2E work) calls `mvn package`.
        # pom.xml sets maven.compiler.source/target=17; Temurin 21 is
        # LTS and forward-compatible with source level 17.
        # cache: maven caches ~/.m2/repository so subsequent runs skip
        # the multi-hundred-MB dependency download.
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # ---------------------------------------------------------------
      # System-level deps: openssl, nlohmann-json, libblake3 (Ruby FFI),
      # libyaml (Ruby psych/bundler runtime). Run BEFORE setup-ruby so
      # the bundler-cache step has libblake3 and libyaml already on the
      # host when it resolves and builds native gems.
      #
      # cpp BLAKE3 is vendored at tools/blake3-vendored/; the Ruby kit's
      # FFI binding to libblake3 needs the system package because no
      # rubygem on Ruby 3.x exposes 64-byte XOF mode (per PR #226 notes).
      # ---------------------------------------------------------------

      - name: Install C++ system deps + z3 + libyaml
        # z3 is the SMT solver invoked by the TS workflow producer's
        # checkImplication / bridgeEnforcement / circularProof tests
        # (`provekit prove` substrate). Without it on PATH, every
        # solver invocation returns ENOENT, the producer maps that to
        # `undecidable`, and ~10 tests fail with errors of the shape
        # `expected 'undecidable' to be 'equivalent'`. The `prove`
        # workflow in provekit.yml installed z3; this gate did not.
        # Closes task #215 ("CI: TS workflow producer tests failing").
        #
        # libyaml-dev is needed for Ruby's psych (YAML) extension;
        # bundler-cache fails with `libyaml-0.so.2: cannot open shared
        # object file` without it on Ubuntu 24.04 hosted runners.
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            cmake \
            libsodium-dev \
            libssl-dev \
            libyaml-dev \
            maven \
            nlohmann-json3-dev \
            z3

      - name: Build + install libblake3 from upstream
        # Ubuntu 24.04 LTS apt does not ship libblake3-dev (added in
        # Ubuntu 25.10). The Ruby kit's BLAKE3 binding goes through FFI
        # to libblake3 because no rubygem on Ruby 3.x exposes 64-byte
        # XOF mode (per PR #226 notes: digest-blake3, blake3-rb,
        # blake3ruby all 32-byte only). Build libblake3 from the
        # official upstream and install to /usr/local/lib so Ruby's
        # FFI loader finds it.
        #
        # Future: vendor BLAKE3 in the ruby kit itself (tools/blake3-vendored/
        # is already in the repo for cpp). Tracked separately.
        run: |
          set -euxo pipefail
          BLAKE3_VERSION=1.5.4
          curl -fsSL "https://github.com/BLAKE3-team/BLAKE3/archive/refs/tags/${BLAKE3_VERSION}.tar.gz" -o /tmp/blake3.tar.gz
          mkdir -p /tmp/blake3-build
          tar -xzf /tmp/blake3.tar.gz -C /tmp/blake3-build
          cd /tmp/blake3-build/BLAKE3-${BLAKE3_VERSION}/c
          cmake -B build -DBLAKE3_USE_TBB=OFF -DBUILD_SHARED_LIBS=ON
          cmake --build build --config Release
          sudo cmake --install build
          sudo ldconfig
          ldconfig -p | grep -i blake3 || (echo "libblake3 not registered" && exit 1)

      - name: Set up Ruby 3.3
        # mint-ruby-self-contracts (PR #234, issue #209) ships a Ruby
        # orchestrator that the rust CLI invokes via the lift-plugin-protocol
        # RPC. Without ruby on PATH the orchestrator binary errors at exec
        # and the contractSetCid pinned-CID test sees the empty-set sentinel.
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: implementations/ruby

      # Zig setup deferred to a separate PR. mlugg/setup-zig@v1 with
      # version: master gets 404s/503s across every mirror because the
      # kit needs unreleased 0.16/0.17-dev API. Tracked as a follow-up.

      # ---------------------------------------------------------------
      # The gate.
      # ---------------------------------------------------------------

      - name: make help (sanity)
        run: make help

      - name: make conformance
        # Catalog v1.2.0 hash equality, signed protocol verify, and all 5
        # peer self-contract CIDs equal their pinned values. Failure here
        # means the protocol has drifted and the PR is not mergeable.
        run: make conformance

      - name: make test-all
        # Per-language native test suites. test-rust runs the Rust
        # workspace + the two tools crates; test-go iterates the three
        # Go modules; test-ts runs vitest; test-csharp runs xUnit;
        # test-python runs pytest after a local pip install.
        run: make test-all
