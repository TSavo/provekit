# Sugar CI: the acid test
#
# Drop sugar into a project, prove correctness with zero code changes.
# `make ci` runs the two suites that actually do that: `test-rust` (the rust
# workspace, including the crate-pair inheritance E2E, exercising the ts
# / python realize kits over RPC) and `test-python` (the python kit, including
# the numpy proof). No federation conformance gate; the Makefile is the
# contract.

name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  acid-test:
    name: acid test (make ci)
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Restore Rust target dirs
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            implementations/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Rust target dirs
        if: github.event_name != 'pull_request'
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            implementations/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-



      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Install system deps (z3, maven)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends z3 maven

      - name: make ci
        run: make ci
        env:
          CI: '1'
