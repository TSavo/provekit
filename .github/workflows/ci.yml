# Sugar CI: the acid test
#
# Drop sugar into a project, prove correctness with zero code changes.
# `make ci` runs the two suites that actually do that: `test-rust` (the rust
# workspace, including the crate-pair inheritance E2E, exercising the ts
# / python realize kits over RPC) and `test-python` (the python kit, including
# the numpy proof). No federation conformance gate; the Makefile is the
# contract.

name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  acid-test:
    name: acid test (make ci)
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Restore Rust target dirs
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            implementations/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Rust target dirs
        if: github.event_name != 'pull_request'
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            implementations/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-



      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install system deps (z3, maven, vampire)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends z3 maven unzip
          # Vampire v5.0.1 prebuilt static binary (matches tools/portfolio pin) so the
          # forall-vampire showcase runs in CI for real instead of skipping.
          curl -fsSL -o /tmp/vampire.zip https://github.com/vprover/vampire/releases/download/v5.0.1/vampire-Linux-X64.zip
          unzip -o -q /tmp/vampire.zip -d /tmp/vampire-bin
          sudo install -m 0755 /tmp/vampire-bin/vampire /usr/local/bin/vampire
          vampire --version | head -1 || true

      - name: make ci
        run: make ci
        env:
          CI: '1'
