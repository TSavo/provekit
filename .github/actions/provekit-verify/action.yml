name: 'ProvekIt Verify'
description: 'Run the ProvekIt standing-invariant gate against a repository.'
author: 'ProvekIt'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  working-directory:
    description: 'Directory in which to run `provekit verify`. Defaults to the repository root.'
    required: false
    default: '.'
  fail-on-decay:
    description: 'When false, exit code 2 (decay) is treated as success. Default true.'
    required: false
    default: 'true'
  verbose:
    description: 'Pass --verbose to provekit. Default false.'
    required: false
    default: 'false'
  provekit-version:
    description: 'npm version spec for provekit. Defaults to the latest published version.'
    required: false
    default: 'latest'

outputs:
  report-json:
    description: 'JSON-encoded VerifyReport (also written to .provekit/last-verify.json).'
    value: ${{ steps.verify.outputs.report-json }}
  summary-md:
    description: 'Markdown summary of the run, suitable for posting as a PR comment.'
    value: ${{ steps.verify.outputs.summary-md }}

runs:
  using: 'composite'
  steps:
    - name: Run provekit verify
      id: verify
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        PROVEKIT_VERSION: ${{ inputs.provekit-version }}
        FAIL_ON_DECAY: ${{ inputs.fail-on-decay }}
        VERBOSE: ${{ inputs.verbose }}
      run: |
        set +e

        verbose_flag=""
        if [ "$VERBOSE" = "true" ]; then verbose_flag="--verbose"; fi

        # Capture the JSON report. We run twice: once with --json to capture
        # the machine-readable verdict, once without for human-friendly logs.
        # The duplicate run is cheap because the cache is warm on the second
        # call. Both go through `provekit verify`: the standing-
        # runtime gate, no LLM, no network.
        npx -y "provekit@${PROVEKIT_VERSION}" verify --json $verbose_flag > provekit-report.json 2> provekit-report.err
        json_exit=$?

        npx -y "provekit@${PROVEKIT_VERSION}" verify $verbose_flag
        verify_exit=$?

        # Build a markdown summary from the JSON report. Falls back to
        # stderr-derived diagnostics if the JSON file is missing.
        if [ -s provekit-report.json ]; then
          summary=$(node -e '
            const fs = require("fs");
            try {
              const r = JSON.parse(fs.readFileSync("provekit-report.json", "utf-8"));
              const s = r.summary ?? {};
              const lines = [];
              lines.push("## ProvekIt verify");
              lines.push("");
              lines.push("| metric | count |");
              lines.push("| --- | --- |");
              lines.push("| total | " + (s.total ?? 0) + " |");
              lines.push("| holds | " + (s.holds ?? 0) + " |");
              lines.push("| violated | " + (s.violated ?? 0) + " |");
              lines.push("| decayed | " + (s.decayed ?? 0) + " |");
              lines.push("| timeout | " + (s.timeout ?? 0) + " |");
              if (s.cacheHits !== undefined) {
                lines.push("| cache hits | " + s.cacheHits + " |");
                lines.push("| cache misses | " + s.cacheMisses + " |");
              }
              process.stdout.write(lines.join("\n") + "\n");
            } catch (e) {
              process.stdout.write("## ProvekIt verify\n\n_Report parse failed: " + e.message + "_\n");
            }
          ')
        else
          summary="## ProvekIt verify\n\n_No report emitted._\n"
        fi

        # GitHub multi-line output protocol.
        {
          echo "report-json<<__PROVEKIT_EOF__"
          cat provekit-report.json 2>/dev/null || echo "{}"
          echo "__PROVEKIT_EOF__"
          echo "summary-md<<__PROVEKIT_EOF__"
          printf '%s\n' "$summary"
          echo "__PROVEKIT_EOF__"
        } >> "$GITHUB_OUTPUT"

        # Also drop the summary into the job's step summary for free
        # visibility on the run page.
        {
          printf '%s\n' "$summary"
        } >> "$GITHUB_STEP_SUMMARY"

        # Exit-code policy:
        #   0: all invariants hold
        #   1: at least one violation (always fail)
        #   2: decay (gated by fail-on-decay)
        #   3: internal error (always fail)
        if [ "$verify_exit" -eq 0 ]; then
          exit 0
        elif [ "$verify_exit" -eq 2 ] && [ "$FAIL_ON_DECAY" = "false" ]; then
          echo "provekit-verify: decay detected, fail-on-decay=false, treating as success"
          exit 0
        else
          exit "$verify_exit"
        fi
