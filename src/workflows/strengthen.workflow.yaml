# Strengthen workflow — tighten an existing invariant.
#
# Workflow shape:
#   1. formulate-via-lifter (Stage) — given the user's natural-language
#      strengthening request + the prior invariant text, the LLM emits
#      a new `.invariant.ts` SURFACE; the lifter canonicalizes to IR.
#
#   2. compare-formulas (Stage, terminal) — diffs the prior IrFormula
#      vs the lifted-new IrFormula in mode=strengthen. Output reports
#      added/removed top-level conjuncts so the consumer sees what
#      tightened.
#
#   3. write-invariant-file (Action, runAfter compare) — overwrites
#      the on-disk `.invariant.ts` with the new surface text. Runs
#      after the diff so the file is touched only when the chain
#      reached a terminal verdict.
#
# Dual to the weaken workflow. The mode=strengthen hint lets
# downstream consumers render the appropriate language ("tightened by
# adding X — re-verify every callsite") without re-deriving the
# direction from the delta.
#
# QUIET PART: Strengthen's failure mode is real. Each callsite that
# previously satisfied the OLD contract may NOT satisfy the NEW
# contract. Caller is responsible for re-running the verification
# against every callsite after this workflow lands; the diff names
# the added conjuncts and that's the punch list. SMT-backed
# implication check (new is superset of old) lands when the SMT-LIB
# translator wires through.

name: strengthen
cid: bafy-strengthen-v1
description: >-
  Tighten an existing invariant. Lifts the new surface text via the
  formulate-via-lifter Stage, diffs against the supplied prior
  IrFormula via compare-formulas (mode=strengthen), and overwrites
  the .invariant.ts file. Terminal artifact: CompareFormulasDelta.

nodes:
  # ---------------------------------------------------------------------------
  # Formulate the new (tightened) invariant via the lifter.
  # ---------------------------------------------------------------------------
  - id: formulate
    capability: formulate-via-lifter
    input:
      intent: $input.intent
      tests: $input.tests
      diff: $input.diff
      locus: $input.locus

  # ---------------------------------------------------------------------------
  # Diff the prior IrFormula against the freshly-lifted formula.
  # mode=strengthen is recorded in the delta; consumers walking from
  # the workflow output land here directly.
  # ---------------------------------------------------------------------------
  - id: compare
    capability: compare-formulas
    input:
      oldFormula: $input.oldFormula
      newFormula: $node.formulate.output.formula
      mode: strengthen

# ---------------------------------------------------------------------------
# Actions — write the new surface to disk after the chain terminates.
# ---------------------------------------------------------------------------
actions:
  - id: write
    action: write-invariant-file
    input:
      path: $input.filePath
      surfaceText: $node.formulate.output.surfaceText
      mode: overwrite
    runAfter: $node.compare

output: $node.compare.output
