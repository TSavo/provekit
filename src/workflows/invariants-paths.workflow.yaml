# Invariants-paths workflow — enumerate dataflow paths to a stored
# invariant's callsite.
#
# Diagnostic surface for debugging the substrate's path enumerator.
# Replaces `provekit invariants paths <id>` from src/cli.ts.

name: invariants-paths
cid: bafy-invariants-paths-v1
description: >-
  Enumerate dataflow paths to a stored invariant's callsite via the
  substrate's path enumerator. Diagnostic surface; the verifier consumes
  the same enumerator under the hood.

cli:
  description: Enumerate dataflow paths to an invariant's callsite (diagnostic).
  args:
    - name: invariantId
      positional: true
      required: true
      type: string
    - name: projectRoot
      flag: true
      type: path
      default: "."
    - name: maxPaths
      flag: true
      type: int
      default: 50

nodes:
  - id: enumerate
    capability: enumerate-invariant-paths
    input:
      projectRoot: $input.projectRoot
      invariantId: $input.invariantId
      maxPaths: $input.maxPaths

output: $node.enumerate.output
