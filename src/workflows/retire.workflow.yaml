# Retire workflow — deprecate an existing invariant.
#
# Two effects:
#   1. mints a `verdict: decayed` memento via the mint-deprecation
#      Stage. The audit trail is the memento; auditors walking from
#      this workflow's output land at "this invariant is no longer
#      asserted" with the supplied reason and propertyHash.
#
#   2. appends a `must.skip(...)` marker to the on-disk
#      `.invariant.ts` file via the write-invariant-file Action. The
#      source-level marker is for HUMAN readers; the durable record
#      is the memento.
#
# The Stage is the terminal output (per manifest validator: terminal
# must be a Stage, not an Action). The Action runs alongside, ordered
# AFTER the Stage so the audit memento exists before the file is
# touched.

name: retire
cid: bafy-retire-v1
description: >-
  Deprecate an existing invariant. Mints a verdict:decayed memento with
  the supplied reason; appends a must.skip(...) marker to the
  .invariant.ts file as a human-readable hint. The memento is the
  authoritative record; the source marker is documentation.

nodes:
  # ---------------------------------------------------------------------------
  # Mint the deprecation record. Terminal Stage; carries the
  # verdict:decayed claim that downstream consumers walk from.
  # ---------------------------------------------------------------------------
  - id: mint
    capability: mint-deprecation
    input:
      retiredPropertyHash: $input.retiredPropertyHash
      propertyName: $input.propertyName
      reason: $input.reason
      filePath: $input.filePath

# ---------------------------------------------------------------------------
# Actions — side-effecting source-level marker.
# ---------------------------------------------------------------------------
actions:
  # Append a must.skip(...) comment block to the .invariant.ts file
  # so humans reading the source see that this invariant is retired.
  # runAfter: mint — the audit memento is minted first; the file write
  # is the secondary effect.
  - id: mark-skipped
    action: write-invariant-file
    input:
      path: $input.filePath
      surfaceText: $input.skipMarker
      mode: append
    runAfter: $node.mint

output: $node.mint.output
