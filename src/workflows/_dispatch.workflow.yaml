# Meta-dispatcher — the CLI's command surface, expressed as a workflow.
#
# Spec: docs/specs/2026-04-29-correctness-is-a-hash.md
#       §"All operations are YAML workflows"
#
# The framework's command surface IS the contents of `src/workflows/`.
# When `provekit <command>` runs, src/cli.ts loads this manifest and
# executes it. The dispatcher walks argv, locates the matching
# workflow by name, and invokes it.
#
# Three nodes:
#
#   1. parse-argv (Stage) — pure over (argv, cliBlocks). Produces the
#      command name and parsed-arg map. Cacheable.
#
#   2. locate-workflow (Stage) — pure over (command, manifestPaths).
#      Reads the matching YAML and returns the parsed manifest. Cacheable.
#
#   3. invoke-workflow (Action) — invokes the located workflow via
#      runManifest. Side-effecting: real DB / LLM / fs touch happens
#      inside the invoked workflow's stages. Audit-only memento.
#
# The dispatcher's `cli:` block is intentionally absent — it's an
# internal workflow (name starts with `_`), not addressable as a
# `provekit <command>`. parse-argv refuses underscore-prefixed names.
#
# Help-rendering and unknown-command messages are NOT routed through
# this manifest — cli.ts intercepts those before invoking the
# dispatcher (the manifest format has no conditionals; only the
# happy-path runs through here).

name: _dispatch
cid: bafy-dispatch-v1
description: >-
  Parse argv, locate the matching workflow YAML, invoke it. The CLI's
  entire dispatch surface, expressed as a YAML workflow.

nodes:
  - id: parse-argv
    capability: parse-argv
    input:
      argv: $input.argv
      cliBlocks: $input.cliBlocks

  - id: locate-workflow
    capability: locate-workflow
    input:
      command: $node.parse-argv.output.command
      manifestPaths: $input.manifestPaths

actions:
  - id: invoke
    action: invoke-workflow
    input:
      workflow: $node.locate-workflow.output.workflow
      factories: $input.factories
      deps: $input.deps
      workflowInput: $node.parse-argv.output.parsedArgs

# Terminal output is locate-workflow's parsed manifest. The Action
# runs after but its resource isn't a Stage output (it's a live
# resource handle, not a content-addressable claim). Callers that
# want the invoked workflow's actual output read it via the Action's
# resource, which the WorkflowRunner exposes through the resources
# map during the run.
output: $node.locate-workflow.output
