# Override workflow — record a developer's intent to bypass the gate.
#
# The imperative form (src/cli.ts:runOverride) prints a single
# acknowledgment line and exits. The lifted form is a single-Stage
# workflow that mints a content-addressable override-record memento;
# the dispatcher prints record.message and exits.
#
# Side-effect-free by design. The actual bypass happens when the
# developer runs `git commit --no-verify` — outside the framework's
# scope. The workflow's job is to make the OVERRIDE INTENT walkable in
# the audit DAG: future tooling can list overrides, group by reason,
# correlate against violations.

name: override
cid: bafy-override-v1
description: >-
  Record a developer's stated reason for bypassing the provekit gate.
  Terminal artifact: an override-record claim including the reason and
  the followup `git commit --no-verify` hint.

cli:
  description: Record an override for --no-verify
  args:
    - name: reason
      flag: false
      type: string
      required: true

nodes:
  - id: record
    capability: record-override
    input:
      reason: $input.reason

output: $node.record.output
