# Reevaluate-invariant workflow — data-driven manifest.
#
# The case-3 routing path. When `provekit invariants verify` reports that
# an invariant is decayed because the function's content hash no longer
# resolves (NOT just a line shift; the function was edited), this workflow
# asks the LLM whether the invariant survives the edit and routes the
# verdict to the appropriate downstream workflow.
#
# Three stages:
#   - load-invariant — read .provekit/invariants/<id>.json
#   - locate-current-function — find the (possibly-edited) function in the
#     current substrate
#   - reevaluate-invariant — LLM judgment: holds / strengthened / weakened /
#     refuted / gone / uncertain
#
# Output is a structured verdict; downstream automation routes:
#   holds        → rebind (mechanical re-anchor with new functionHash)
#   strengthened → strengthen workflow with the LLM's tighter claim
#   weakened     → weaken workflow with the LLM's looser claim
#   refuted      → refute workflow (Z3 finds the counterexample)
#   gone         → retire workflow
#   uncertain    → human review; no auto-route
#
# Spec: protocol/specs/2026-04-29-the-semantic-envelope.md (case 3 of the
# binding state machine)

name: reevaluate-invariant
cid: bafy-reevaluate-invariant-v1
description: >-
  When an invariant's binding decays semantically (function edited, not
  just shifted), ask the LLM whether the original claim still holds and
  recommend the appropriate next workflow.

cli:
  description: Ask the LLM whether a decayed invariant still holds against the edited function
  args:
    - name: invariantId
      positional: true
      required: true
      type: string
    - name: projectRoot
      type: path
      default: "."
    - name: model
      type: string
      default: "sonnet"

output: $node.reevaluate.output

nodes:
  - id: load-invariant
    capability: load-invariant
    input:
      projectRoot: $input.projectRoot
      id: $input.invariantId

  - id: locate-current-function
    capability: locate-current-function
    input:
      invariant: $node.load-invariant.output
      projectRoot: $input.projectRoot

  - id: reevaluate
    capability: reevaluate-invariant
    input:
      invariant: $node.load-invariant.output
      currentFunctionBody: $node.locate-current-function.output.currentBody
      currentFunctionHash: $node.locate-current-function.output.currentHash
      model: $input.model
