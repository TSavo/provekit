# Mint workflow — sign a memento envelope from a JSON spec.
#
# The framework's CORE primitive operation, exposed as a workflow.
# Two Stages and one Action:
#   - load-mint-spec: parse the JSON spec from path or take it inline
#   - mint-memento:   sign + return the envelope (deterministic for
#                     a given (spec, key) pair)
#   - write-memento-file (Action): persist the envelope to a path on
#                     disk
#
# Stdout-only mode (the cli.mint.ts default when --out is omitted) is
# NOT this workflow's surface; the CLI shim handles stdout directly by
# running just the Stages and skipping the Action. The workflow itself
# always writes a file — the audit memento records the path that
# landed.

name: mint
cid: bafy-mint-v1
description: >-
  Sign a memento envelope from a JSON specification (property, bridge,
  catalog, or generic kinds). Optionally writes the envelope to a file
  via the write-memento-file action.

cli:
  description: Mint a signed memento (property, bridge, catalog, or generic).
  args:
    - name: kind
      positional: true
      required: true
      type: string
    - name: spec
      flag: true
      type: path
    - name: key
      flag: true
      type: path
    - name: out
      flag: true
      type: path

nodes:
  - id: load-spec
    capability: load-mint-spec
    input:
      kind: $input.kind
      specPath: $input.specPath
      spec: $input.spec

  - id: mint
    capability: mint-memento
    input:
      loaded: $node.load-spec.output
      privateKeyPem: $input.privateKeyPem

actions:
  - id: write
    action: write-memento-file
    input:
      envelope: $node.mint.output.envelope
      path: $input.outPath
    runAfter: $node.mint

output: $node.mint.output
