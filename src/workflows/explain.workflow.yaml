# Explain workflow — local render of a memento's proof chain.
#
# Pure read; no side effects; no LLM. Given a starting `propertyHash`
# (or more precisely, a starting memento CID), the workflow walks the
# CONSUMER'S LOCAL memento store and produces a human-readable
# rendering of the chain.
#
# Scope discipline (CRITICAL):
#   docs/specs/2026-04-29-correctness-is-a-hash.md §"What ProvekIt is"
#
#   This workflow does NOT walk into deeper-layer codebases. CIDs that
#   appear in `inputCids` but are not present in the local store are
#   surfaced via `unresolvedInputCids`. Auditors take that list to
#   their own tooling and traverse externally.

name: explain
cid: bafy-explain-v1
description: >-
  Render the local proof chain rooted at a given memento CID. Pure
  read; surfaces unresolved CIDs without chasing them. Terminal artifact:
  RenderProofChainOutput { mementos, unresolvedInputCids, text }.

cli:
  description: Render a memento's local proof chain
  args:
    - name: startCid
      positional: true
      required: true
      type: string
    - name: maxDepth
      type: int

nodes:
  - id: render
    capability: render-proof-chain
    input:
      startCid: $input.startCid
      maxDepth: $input.maxDepth

output: $node.render.output
