[package]
name = "foundation-keygen"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "ProvekIt Foundation Root Key generator + catalog-CID signer (v1.1.0). Reproducibly produces the v0 test foundation key (deterministic seed) and the signed attestation over the protocol catalog CID."

[[bin]]
name = "foundation-keygen"
path = "src/bin/foundation_keygen.rs"

[[bin]]
name = "sign-catalog"
path = "src/bin/sign_catalog.rs"

[[bin]]
name = "sign-catalog-v1-2-0"
path = "src/bin/sign_catalog_v1_2_0.rs"

[[bin]]
name = "sign-catalog-v1-3-0"
path = "src/bin/sign_catalog_v1_3_0.rs"

[[bin]]
name = "sign-catalog-v1-3-1"
path = "src/bin/sign_catalog_v1_3_1.rs"

[[bin]]
name = "sign-catalog-v1-4-0"
path = "src/bin/sign_catalog_v1_4_0.rs"

[[bin]]
name = "sign-catalog-v1-4-1"
path = "src/bin/sign_catalog_v1_4_1.rs"

[[bin]]
name = "sign-catalog-v1-5-0"
path = "src/bin/sign_catalog_v1_5_0.rs"

[[bin]]
name = "sign-self-contracts"
path = "src/bin/sign_self_contracts.rs"

[[bin]]
name = "verify-self-contracts"
path = "src/bin/verify_self_contracts.rs"

[lib]
path = "src/lib.rs"

[dependencies]
# Cross-crate path deps: reuse the workspace's crypto + canonicalization
# helpers verbatim. No reimplementation of Ed25519 or JCS here.
provekit-canonicalizer = { path = "../../implementations/rust/provekit-canonicalizer" }
provekit-proof-envelope = { path = "../../implementations/rust/provekit-proof-envelope" }
serde_json = { version = "1", features = ["preserve_order"] }
