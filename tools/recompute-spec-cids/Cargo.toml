[package]
name = "recompute-spec-cids"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "Compute BLAKE3-512 CIDs for protocol spec files and the protocol catalog (v1.1.0 freeze tool)."

[[bin]]
name = "recompute-spec-cids"
path = "src/main.rs"

[dependencies]
# Use the workspace's canonicalizer for JCS encoding + BLAKE3-512 hashing.
# Path dep keeps cross-language hash agreement: this tool uses the same
# encoder bytes the Rust peer ships with.
provekit-canonicalizer = { path = "../../implementations/rust/provekit-canonicalizer" }
serde_json = { version = "1", features = ["preserve_order"] }
