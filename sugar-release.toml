# sugar's own shippable artifacts -- the self-attestation manifest.
#
# This is the config that ARMS the coarse supply-chain pin on sugar itself.
# `make self-attest` (run by `make ci`) executes
#   sugar package release --manifest sugar-release.toml
# which content-addresses each declared artifact, writes its
# PackageReleaseReceipt (the top-level `binaryCid` the admission gate consumes),
# and re-verifies. A sound gate that nothing arms is a silence read wrong; this
# manifest is the producer that loads the round, dogfooded on the very tool
# doing the gating.
#
# Paths are relative to this manifest's directory (the repo root).

version = "0.1.0"

[[artifact]]
name = "sugar"
path = "implementations/rust/target/release/sugar"

[[artifact]]
name = "sugar-lift"
path = "implementations/rust/target/release/sugar-lift"

# Dependency-vector pin: the SUPPLY CHAIN is pinned TOTAL, not sworn. `release`
# content-addresses the COMPLETE Cargo.lock dependency closure (every package's
# name/version/source/checksum) into one `dependencyVectorsCid`; `--verify-only`
# re-derives it and fails closed on any drift. Conjunctive -- a changed, added,
# or removed dependency moves the CID (N-1 of N pinned is zero), so the xz-class
# "one quiet dep" hole becomes a loud mismatch, not a silent acceptance.
[dependencies]
lockfile = "implementations/rust/Cargo.lock"

# Coverage gate: completeness is STRUCTURAL, not sworn. Every bin the workspace
# builds (cargo metadata --no-deps) must be either pinned above or listed here.
# A newly-added bin that is neither FAILS `package release` -- so a shippable
# binary can never be silently left unpinned. `exclude` is the explicit
# decision that a bin is not a pinned deliverable of THIS manifest (internal
# rpc/test/dev bins, or deliverables not yet pinned). To pin one, move it to an
# [[artifact]] above and ensure the build produces it.
[coverage]
cargo_manifest = "implementations/rust/Cargo.toml"
exclude = [
  # cargo subcommand wrappers (front the same CLIs as sugar/sugar-lift)
  "cargo-sugar",
  "cargo-sugar-lift",
  # language-server / linker daemons (editor/build integration, not yet pinned)
  "sugar-lsp",
  "sugar-lsp-rust",
  "sugar-linkerd",
  # IR-compiler backend bins (internal to the verify pipeline)
  "sugar-ir-coq",
  "sugar-ir-lean",
  "sugar-ir-maude",
  "sugar-ir-smt-lib",
  # JSON-RPC protocol servers (internal lift/verify transport)
  "contracts_rpc",
  "witness_rpc",
  "rust_test_assertions_rpc",
  "sugar-plugin-loader-stub-rpc",
  "sugar-walk-rpc",
  # dev / test / fixture / demo tooling (not shipped)
  "compute_fixture_cid",
  "coretests_sweep",
  "discharge_cli",
  "emit_c_fixtures",
  "hover_probe",
  "mint-plugin-cid",
  "sugar-walk-demo",
  "sugar-walk-emit",
]
